types:

  # ---- Primitive numeric types ----
  - id: Int8
    kind: primitive
    summary: Signed 8-bit integer.
  - id: Int16
    kind: primitive
    summary: Signed 16-bit integer.
  - id: Int32
    kind: primitive
    summary: Signed 32-bit integer.
  - id: Int64
    kind: primitive
    summary: Default signed 64-bit integer. Uncontexted integer literals infer to Int64.
  - id: IntNative
    kind: primitive
    summary: Platform-width signed integer. Maps to C ssize_t.
  - id: UInt8
    kind: primitive
    summary: Unsigned 8-bit integer, also aliased as Byte.
  - id: UInt16
    kind: primitive
    summary: Unsigned 16-bit integer.
  - id: UInt32
    kind: primitive
    summary: Unsigned 32-bit integer.
  - id: UInt64
    kind: primitive
    summary: Unsigned 64-bit integer.
  - id: UIntNative
    kind: primitive
    summary: Platform-width unsigned integer. Maps to C size_t.
  - id: Float16
    kind: primitive
    summary: IEEE 754 half-precision float (~3 significant digits).
  - id: Float32
    kind: primitive
    summary: IEEE 754 single-precision float (~6 significant digits).
  - id: Float64
    kind: primitive
    summary: IEEE 754 double-precision float (~15 significant digits). Default float literal type.

  # ---- Character and string ----
  - id: Rune
    kind: primitive
    summary: A single Unicode scalar value. No arithmetic operations; convert to UInt32 first. Supports relational operators only.
    notes:
      - "Valid ranges: [0x0000, 0xD7FF] and [0xE000, 0x10FFFF]."
      - "Convert: UInt32(runeExpr) to get scalar, Rune(intExpr) to get rune."
  - id: String
    kind: value
    summary: UTF-8 encoded string (struct type, value semantics). for-in iterates bytes (UInt8); use runes() for Rune characters.
    implements: ["Collection<UInt8>", "Comparable<String>", Hashable, ToString]
    notes:
      - ".size returns UTF-8 byte count, not character count."
      - "s[i] returns UInt8 (byte), not a character."
      - "Interpolation: \"${expr}\" in non-raw literals."
  - id: StringBuilder
    kind: reference
    summary: Efficient mutable string builder for concatenation-heavy code.

  - id: Ordering
    kind: enum
    summary: Comparison result enum with values LT, EQ, and GT. Returned by compare methods.

  - id: Duration
    kind: value
    summary: Time interval struct from std.core. Supports arithmetic, comparison, and named unit constants.
    implements: ["Comparable<Duration>", Hashable, ToString]
    notes:
      - "Common constants: Zero, nanosecond, microsecond, millisecond, second, minute, hour, day."
      - "Used by sleep(Duration), Future.get(timeout), Timer.once/repeat, and timeout-related APIs."

  # ---- Boolean ----
  - id: Bool
    kind: primitive
    summary: Boolean type with literals true and false. Supports !, &&, ||, &&=, ||=.

  # ---- Unit and Nothing ----
  - id: Unit
    kind: primitive
    summary: Side-effect-only type with unique value (). Type of assignment, loops, println, and side-effect expressions.
  - id: Nothing
    kind: bottom
    summary: Bottom type; subtype of all types. Type of return, throw, break, continue. Code after these is unreachable.

  # ---- Top types ----
  - id: Any
    kind: interface
    summary: Built-in interface. Supertype of all types. All non-interface types implement Any. All interfaces inherit Any.
  - id: Object
    kind: reference
    summary: Default superclass for classes without an explicit parent. All classes are subtypes of Object.

  # ---- Tuple ----
  - id: Tuple
    kind: structural
    summary: Fixed-length heterogeneous sequence with at least 2 elements. Covariant per element. Elements are immutable.
    notes:
      - Access by compile-time integer literal index starting at 0.
      - Named elements allowed but all-or-nothing (either all named or none).
      - "Multi-assignment: (a, b) = (1, 2). Supports swap: (a, b) = (b, a). Use _ to ignore."
      - Equality only if all element types support ==.

  # ---- Array types ----
  - id: Array
    kind: generic
    summary: Fixed-length ordered collection. Struct type but shares underlying storage on assignment (shared-reference semantics).
    parameters:
      - name: T
        must_resolve_to: type
    instantiate_as: Array<T>
    notes:
      - "Literal: [e1, e2, ...]. Empty: Array<T>()."
      - "Constructor: Array<T>(count, repeat: value) or Array<T>(count, { i => expr })."
      - "Elements mutable via subscript: arr[i] = value."
      - "Slicing uses Range<Int64>: arr[start..end], arr[..end], and arr[start..] return sub-arrays."
      - ".size property for length."

  - id: VArray
    kind: generic
    summary: True value-type fixed-length array with compile-time size $N. No GC overhead. For C interop.
    parameters:
      - name: T
        must_resolve_to: ctype_compatible
      - name: N
        must_resolve_to: integer_literal
    instantiate_as: VArray<T, $N>
    notes:
      - Element type T cannot be reference type, enum, lambda, or uninstantiated generic.
      - Copies on assignment (true value semantics).
      - Can be used in @C struct.

  # ---- Range ----
  - id: Range
    kind: generic
    summary: "Range type. .. (half-open, excludes end) and ..= (closed, includes end). Optional : step."
    parameters:
      - name: T
        constraints: ["Countable<T>", "Comparable<T>", "Equatable<T>"]
    instantiate_as: Range<T>
    notes:
      - "Public signature: Range<T> <: Iterable<T> where T <: Countable<T> & Comparable<T> & Equatable<T>."
      - "step must not be 0 (runtime error)."
      - "Negative step for reverse iteration."
      - "Empty if step > 0 && start >= end (half-open) or start > end (closed)."

  # ---- Option ----
  - id: Option
    kind: generic
    summary: Predefined enum Option<T> with Some(T) and None. Shorthand ?T.
    parameters:
      - name: T
        must_resolve_to: type
    instantiate_as: Option<T>
    notes:
      - Automatic Some wrapping when context expects Option<T> and a T value is provided.
      - "Coalescing: a ?? b (short-circuit). Optional chaining: a?.member (short-circuit)."
      - "if-let: if (let Some(v) <- opt) { ... }. while-let: while (let Some(v) <- iter.next()) { ... }."
      - "getOrThrow() returns T or throws NoneValueException."

  # ---- Standard library collections ----
  - id: ArrayList
    kind: generic
    summary: Dynamic-length list from std.collection. Reference type with auto-resize.
    parameters:
      - name: T
        must_resolve_to: type
    instantiate_as: ArrayList<T>
    import: std.collection.*

  - id: HashMap
    kind: generic
    summary: Hash table from std.collection. K must implement Hashable and Equatable<K>.
    parameters:
      - name: K
        constraints: [Hashable, "Equatable<K>"]
      - name: V
        must_resolve_to: type
    instantiate_as: HashMap<K, V>
    import: std.collection.*
    notes:
      - "Iteration order is not guaranteed. for ((k, v) in map) iterates tuples."

  - id: HashSet
    kind: generic
    summary: Hash set from std.collection. T must implement Hashable and Equatable<T>.
    parameters:
      - name: T
        constraints: [Hashable, "Equatable<T>"]
    instantiate_as: HashSet<T>
    import: std.collection.*

  # ---- Key interfaces ----
  - id: Iterable
    kind: interface
    summary: "Types that can be iterated with for-in. Must provide iterator(): Iterator<T>."
    parameters:
      - name: T
    note: "Built-in iterables: Range, Array, ArrayList, String (bytes), HashMap (tuples), HashSet."

  - id: Iterator
    kind: interface
    summary: "Iterator with mut func next(): Option<T>. Iterator itself extends Iterable."
    parameters:
      - name: T

  - id: Resource
    kind: interface
    summary: "For try-with-resources. Must implement isClosed(): Bool and close(): Unit."

  - id: Hashable
    kind: interface
    summary: Types with a hashCode() function, required for HashMap keys and HashSet elements.

  - id: Equatable
    kind: interface
    summary: "Types with == comparison. Generic: Equatable<T>."
    parameters:
      - name: T

  - id: Comparable
    kind: interface
    summary: "Types with ordering (<, <=, >, >=). Generic: Comparable<T>."
    parameters:
      - name: T

  - id: ToString
    kind: interface
    summary: "Types convertible to String. Provides toString(): String."

  - id: Collection
    kind: interface
    summary: "Base collection interface. Provides size/isEmpty()/toArray() and is commonly inherited by iterable container types."
    parameters:
      - name: T

  - id: Countable
    kind: interface
    summary: "Countable interface used by Range. Supports stepping and positional progression for ordered discrete values."
    parameters:
      - name: T

  - id: CType
    kind: interface
    summary: "Marker interface for C-compatible types. All primitives, @C struct, CPointer, CFunc, CString, VArray satisfy CType."

  # ---- Concurrency types ----
  - id: Future
    kind: generic
    summary: Handle returned by spawn. T matches the lambda return type.
    parameters:
      - name: T
        must_resolve_to: type
    instantiate_as: Future<T>
    notes:
      - "get() blocks until done (rethrows exception from spawned thread)."
      - "get(timeout) throws TimeoutException."
      - "tryGet() returns Option<T> without blocking."
      - "cancel() is cooperative; thread must check hasPendingCancellation."

  - id: Thread
    kind: reference
    summary: Thread descriptor. Not directly instantiatable; obtained via Future.thread or Thread.currentThread.
    notes:
      - ".id: unique per thread."
      - ".hasPendingCancellation: Bool for cooperative cancellation check."

  - id: Mutex
    kind: reference
    summary: Reentrant mutex lock. Supports lock(), unlock(), tryLock(), condition(). Re-entrant by same thread.
    import: std.sync.*
    notes:
      - "unlock() without lock throws IllegalSynchronizationStateException."
      - "Use with synchronized(mtx) { ... } for auto lock/unlock."

  - id: Condition
    kind: reference
    summary: Condition variable created via mutex.condition(). Must be created while holding the lock.
    import: std.sync.*
    notes:
      - "wait(): indefinite. wait(timeout): may throw TimeoutException."
      - "waitUntil(predicate): loop-based wait (avoids spurious wakeups)."
      - "notify() and notifyAll() to signal."

  - id: SyncCounter
    kind: reference
    summary: Coordination primitive. dec() decrements, waitUntilZero() blocks until zero.
    import: std.sync.*

  - id: Timer
    kind: reference
    summary: Scheduler from std.sync. Use Timer.once(delay, task) or Timer.repeat(delay, interval, task) and cancel() to stop future runs.
    import: std.sync.*

  - id: Barrier
    kind: reference
    summary: Coordination primitive that blocks participating threads until they all reach the same synchronization point.
    import: std.sync.*

  - id: Semaphore
    kind: reference
    summary: Counting semaphore for bounding concurrent access to a shared resource.
    import: std.sync.*

  - id: ReadWriteLock
    kind: reference
    summary: Reentrant read/write lock supporting multiple readers or a single writer.
    import: std.sync.*

  - id: AtomicInt8
    kind: reference
    summary: Lock-free atomic 8-bit integer.
    import: std.sync.*
  - id: AtomicInt16
    kind: reference
    summary: Lock-free atomic 16-bit integer.
    import: std.sync.*
  - id: AtomicInt32
    kind: reference
    summary: Lock-free atomic 32-bit integer.
    import: std.sync.*
  - id: AtomicInt64
    kind: reference
    summary: Lock-free atomic 64-bit integer.
    import: std.sync.*

  - id: AtomicUInt8
    kind: reference
    summary: Lock-free atomic unsigned 8-bit integer.
    import: std.sync.*
  - id: AtomicUInt16
    kind: reference
    summary: Lock-free atomic unsigned 16-bit integer.
    import: std.sync.*
  - id: AtomicUInt32
    kind: reference
    summary: Lock-free atomic unsigned 32-bit integer.
    import: std.sync.*
  - id: AtomicUInt64
    kind: reference
    summary: Lock-free atomic unsigned 64-bit integer.
    import: std.sync.*

  - id: AtomicBool
    kind: reference
    summary: Lock-free atomic boolean.
    import: std.sync.*

  - id: AtomicReference
    kind: generic
    summary: Lock-free atomic reference. T must be a reference type.
    parameters:
      - name: T
        must_resolve_to: reference_type
    instantiate_as: AtomicReference<T>
    import: std.sync.*

  - id: AtomicOptionReference
    kind: generic
    summary: Lock-free atomic Option-wrapped reference. T must be a reference type.
    parameters:
      - name: T
        must_resolve_to: reference_type
    instantiate_as: AtomicOptionReference<T>
    import: std.sync.*

  - id: ThreadLocal
    kind: generic
    summary: "Thread-local storage. get() returns Option<T>, set(Option<T>) writes (None deletes)."
    parameters:
      - name: T
        must_resolve_to: type
    instantiate_as: ThreadLocal<T>

  # ---- C interop types ----
  - id: CPointer
    kind: generic
    summary: Maps to C pointer T*. T must satisfy CType constraint.
    parameters:
      - name: T
        must_resolve_to: ctype
    instantiate_as: CPointer<T>
    notes:
      - "CPointer<T>() creates null. isNull() checks."
      - "read()/read(idx), write(value)/write(idx, value) for access."
      - "+/- offset (unsafe). toUIntNative() for address."
      - "asResource() for try-with-resources auto-management."

  - id: CFunc
    kind: generic
    summary: Maps to C function pointer. Three forms — foreign C func, @C Cangjie func, CFunc Lambda (no capture).
    parameters:
      - name: F
        must_resolve_to: function_type
    instantiate_as: CFunc<F>

  - id: CString
    kind: reference
    summary: "Null-terminated C string mapping char*. Create via LibC.mallocCString(str), free via LibC.free(cstr)."
    notes:
      - "API: size(), isEmpty(), isNull(), getChars(), equals(), compare(), startsWith(), endsWith(), subCString(), toString()."
      - "asResource() for auto-management."

  # ---- Exception hierarchy ----
  - id: Exception
    kind: reference
    summary: Base class for catchable exceptions. User-defined exceptions must inherit from Exception (not Error).
    notes:
      - "API: init(), init(message), prop message: String, toString(), getClassName(), printStackTrace()."
      - "Built-in: ArithmeticException, IllegalArgumentException, IllegalStateException, IndexOutOfBoundsException, NegativeArraySizeException, NoneValueException, OverflowException (<: ArithmeticException), ConcurrentModificationException, TimeoutException, IllegalSynchronizationStateException."

  - id: Error
    kind: reference
    summary: Internal system or resource exhaustion error. Applications should not throw or inherit Error.
    notes:
      - "API: init(), init(message), prop message: String, toString(), printStackTrace()."
      - "No getClassName() unlike Exception."

  # ---- Reflection ----
  - id: TypeInfo
    kind: reference
    summary: Runtime type descriptor obtained via TypeInfo.of(instance), TypeInfo.of<T>(), or TypeInfo.get(qualifiedName).
    import: std.reflect.*
    notes:
      - "Only public members visible via reflection."
      - "Access methods: getStaticVariable, getInstanceVariable, getStaticProperty, getInstanceProperty, getStaticFunction, getInstanceFunction."
      - "Variable: getValue()/setValue(). Property: getValue(obj)/setValue(obj, val). Function: apply(obj, args)."
      - "findAnnotation<T>() to retrieve annotations."
      - "Cannot get TypeInfo of uninstantiated generic types."

type_system:
  facts:
    - user_defined_generic_types_are_invariant
    - tuple_types_are_covariant_per_element
    - function_types_are_contravariant_in_parameters_covariant_in_return
    - Nothing_is_subtype_of_all_types
    - Any_is_supertype_of_all_types
    - all_classes_implicitly_extend_Object
    - no_implicit_type_conversions_exist
    - numeric_conversion_uses_type_constructor_syntax_T_of_expr
    - Rune_conversion_via_UInt32_and_Rune_constructors
    - subtype_to_supertype_assignment_is_not_a_conversion
    - assignment_is_a_statement_not_an_expression
    - break_continue_return_throw_have_type_Nothing
    - String_is_value_type_struct_not_reference_type
