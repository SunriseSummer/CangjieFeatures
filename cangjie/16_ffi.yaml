foreign_functions:
  syntax: "foreign func functionName(params): ReturnType"
  examples: |
    foreign func rand(): Int32
    foreign func printf(fmt: CString, ...): Int32
    foreign func strlen(s: CString): UIntNative
  rules:
    - "No function body; params/return must satisfy CType"
    - "Supports variadic (...); no named params or defaults"
  calling: |
    unsafe {
        let r = rand()
        printf(LibC.mallocCString("value: %d\n"), r)
    }

type_mapping:
  primitives:
    - { cangjie: "Int8/16/32/64",    c: "int8_t/int16_t/int32_t/int64_t" }
    - { cangjie: "UInt8/16/32/64",   c: "uint8_t/uint16_t/uint32_t/uint64_t" }
    - { cangjie: "Float32/Float64",  c: "float/double" }
    - { cangjie: "Bool",             c: "bool" }
    - { cangjie: "Unit",             c: "void" }
    - { cangjie: "IntNative",        c: "ssize_t" }
    - { cangjie: "UIntNative",       c: "size_t" }
  pointers:
    - { cangjie: "CPointer<T>", c: "T*" }
    - { cangjie: "CString",    c: "const char*" }
  function_pointer: "CFunc<(ParamTypes) -> ReturnType> ↔ ReturnType (*)(ParamTypes)"

cfunc:
  forms:
    foreign: "foreign func free(ptr: CPointer<Int8>): Unit"
    annotated: |
      @C
      func myCallback(value: Int32): Unit { println("Callback: ${value}") }
    lambda: |
      let f: CFunc<(Int32) -> Unit> = { v => println("Lambda: ${v}") }
  restriction: "CFunc lambdas cannot capture variables"

unsafe_blocks:
  required_for: "Calling foreign/CFunc, pointer arithmetic/dereferencing"

inout_parameters:
  syntax: "foreignFunc(inout variable)"
  rules:
    - "Variable must be var; cannot be literals, class members, or CString"
    - "Pointer valid only during the call"
  example: |
    foreign func scanf(fmt: CString, ...): Int32
    var x: Int32 = 0
    unsafe { scanf(LibC.mallocCString("%d"), inout x) }

c_annotation:
  syntax: "@C"
  applicable_to: "foreign functions, top-level non-generic functions, struct types"
  not_applicable_to: "foreign var, classes, interfaces, enums"

memory_management: |
  C memory is not managed by Cangjie GC:
    let ptr = LibC.malloc<Int32>(count: 10)
    LibC.free(ptr)
  CString from mallocCString must be freed manually.
