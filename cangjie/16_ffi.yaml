foreign_functions:
  syntax: "foreign func name(params): ReturnType"
  examples: |
    foreign func rand(): Int32
    foreign func printf(fmt: CString, ...): Int32
    foreign func strlen(s: CString): UIntNative
  rules: ["No body", "Params/return must satisfy CType", "Variadic ... at end", "No named params/defaults"]
  calling: |
    unsafe {
        let r = rand()
        printf(LibC.mallocCString("value: %d\n"), r)
    }

type_mapping:
  primitives:
    - { cangjie: "Int8/16/32/64",     c: "int8_t/int16_t/int32_t/int64_t" }
    - { cangjie: "UInt8/16/32/64",    c: "uint8_t/uint16_t/uint32_t/uint64_t" }
    - { cangjie: "Float32/Float64",   c: "float/double" }
    - { cangjie: "Bool",              c: "bool" }
    - { cangjie: "Unit",              c: "void" }
    - { cangjie: "IntNative/UIntNative", c: "ssize_t/size_t" }
  pointers:
    - { cangjie: "CPointer<T>",       c: "T*" }
    - { cangjie: "CString",           c: "const char*" }
  function_ptr:
    cangjie: "CFunc<(ParamTypes) -> ReturnType>"
    c: "ReturnType (*)(ParamTypes)"

CFunc:
  foreign: "foreign func free(ptr: CPointer<Int8>): Unit"
  annotated: |
    @C
    func myCallback(value: Int32): Unit { println("Callback: ${value}") }
  lambda: |
    let f: CFunc<(Int32) -> Unit> = { v => println("Lambda: ${v}") }
  restriction: "CFunc lambdas cannot capture variables"

unsafe:
  syntax: "unsafe { ... }"
  required_for: ["Foreign function calls", "CFunc calls", "Pointer operations"]

inout:
  syntax: "foreignFunc(inout variable)"
  desc: "Passes var as CPointer<T> to C function"
  rules: ["var only (not let)", "No literals/temporaries", "CType only (not CString)", "Valid only during call"]
  example: |
    foreign func scanf(fmt: CString, ...): Int32
    var x: Int32 = 0
    unsafe { scanf(LibC.mallocCString("%d"), inout x) }

c_annotation:
  syntax: "@C"
  applies_to: ["foreign declarations", "Top-level non-generic functions", "struct types (C-compatible layout)"]
  not_for: ["foreign var", "Classes/interfaces/enums"]

memory:
  note: |
    C memory not managed by GC — use LibC utilities:
      let ptr = LibC.malloc<Int32>(count: 10)
      LibC.free(ptr)
    CString from mallocCString must be freed manually.
