definition:
  note: "Reference type; assignment shares identity"
  syntax: |
    class ClassName {
        // member variables, properties, constructors, functions, operators
    }
  example: |
    class Person {
        private let name: String
        private var age: Int64
        public init(name: String, age: Int64) {
            this.name = name
            this.age = age
        }
        public func greet(): String {
            "Hello, I'm ${name}, age ${age}"
        }
    }

member_variables:
  instance: "var/let name: Type = initialValue"
  static: "static var/let name: Type = initialValue"
  static_initializer: |
    static init() { /* called once before first access; at most one per class */ }

constructors:
  regular:
    syntax: "init(params) { /* must initialize all uninitialized fields */ }"
    execution_order: "field defaults → super() → constructor body"
    delegation: "this(otherParams)"
    parent_call: "super(args)"
  primary: |
    class Point {
        public Point(let x: Float64, let y: Float64) {}
    }
    // Name matches class; let/var params become fields
  auto_generated: "If all fields have defaults and no explicit init, parameterless init() is generated"
  overloading: "Multiple init() with different parameter lists"
  destructor:
    syntax: "~init() { /* cleanup */ }"
    rules:
      - "Called during GC (non-deterministic timing)"
      - "Not allowed in open classes"
      - "Cannot be called manually; at most one per class"

inheritance:
  single: |
    open class Animal {
        public open func speak(): String { "..." }
    }
    class Dog <: Animal {
        public override func speak(): String { "Woof!" }
    }
  sealed: |
    sealed abstract class Shape {
        public func area(): Float64
    }
    // Only classes in same package can inherit
  override_rules:
    instance: "override func — parent method must be open"
    static: "redef static func"
    covariant_return: "Override can return a subtype"
  abstract: |
    abstract class Shape {
        public func area(): Float64  // no body = abstract
    }
    // Cannot instantiate; subclass must implement all abstract members
  super: "super.methodName(args) / super(args)"
  This_type: |
    open class Builder {
        public open func setName(n: String): This { this }
    }
    // SubBuilder().setName("x") returns SubBuilder, not Builder

properties:
  immutable: |
    prop name: Type { get() { expression } }
  mutable: |
    mut prop name: Type {
        get() { expression }
        set(value) { /* assign */ }
    }
  abstract: "abstract prop name: Type"
  static: "static prop name: Type { get() { ... } }"
  example: |
    class Circle {
        var radius: Float64
        public init(r: Float64) { radius = r }
        public prop area: Float64 { get() { 3.14159 * radius * radius } }
        public mut prop r: Float64 {
            get() { radius }
            set(v) { radius = v }
        }
    }

access_modifiers:
  private: "same file only"
  internal: "same package + subpackages (default)"
  protected: "same module + subclass bodies"
  public: "everywhere"
  declaration_order: "public open override func ..."
  constraint: "Member visibility cannot exceed containing type visibility"
