definition:
  note: "Reference type; assignment shares identity"
  example: |
    class Person {
        private let name: String
        private var age: Int64
        public init(name: String, age: Int64) {
            this.name = name
            this.age = age
        }
        public func greet(): String {
            "Hello, I'm ${name}, age ${age}"
        }
    }

members:
  instance: "var/let name: Type = initialValue"   # default visibility: internal
  static: "static var/let name: Type = initialValue"  # accessed via ClassName.name
  static_init: |
    static init() {
        // called once before first access to any static member
        // must initialize all uninitialized static members; at most one per class
    }

constructors:
  regular:
    syntax: |
      init(params) {
          // must initialize all uninitialized member variables
      }
    order: "1. Member defaults → 2. super() → 3. Constructor body"
    delegation: "this(args)  // delegates to another constructor"
    parent_call: "super(args)  // must call parent constructor"
  primary: |
    class Point {
        public Point(let x: Float64, let y: Float64) {}
    }
    // Name matches class name; let/var params become fields
  auto_generated: "Parameterless init() generated when all fields have defaults and no explicit constructor"
  overloading: "Multiple init() with different parameter lists"
  destructor: |
    ~init() {
        // called during GC (non-deterministic); only in non-open classes
        // cannot be manually called; at most one per class
    }

inheritance:
  single: |
    open class Animal {
        public open func speak(): String { "..." }
    }
    class Dog <: Animal {
        public override func speak(): String { "Woof!" }
    }
  requires: "Parent class must be marked open"

  sealed: |
    sealed abstract class Shape {
        public func area(): Float64
    }
    // Only classes in same package can inherit

  override_rules:
    instance: "override func ... — parent method must be open"
    static: "redef static func ... — redefines parent static member"
    covariant_return: "Override can return a subtype"

  abstract: |
    abstract class Shape {
        public func area(): Float64  // no body = abstract
    }
    // Cannot instantiate; subclass must implement all abstract members

  super_call: "super.method(args); super(args) in init()"

  This_type: |
    open class Builder {
        public open func setName(n: String): This { this }
    }
    // SubBuilder().setName("x") returns SubBuilder, not Builder

properties:
  immutable: |
    prop name: Type { get() { expression } }
  mutable: |
    mut prop name: Type {
        get() { expression }
        set(value) { /* assign */ }
    }
  abstract: "abstract prop name: Type"
  static: |
    static prop count: Int64 { get() { _count } }
  example: |
    class Circle {
        var radius: Float64
        public init(r: Float64) { radius = r }
        public prop area: Float64 {
            get() { 3.14159 * radius * radius }
        }
        public mut prop r: Float64 {
            get() { radius }
            set(v) { radius = v }
        }
    }

access_modifiers:
  private: "Same source file only"
  internal: "Same package + subpackages (default)"
  protected: "Same module + subclass bodies"
  public: "Everywhere"
  order: "public open override func ..."
  rule: "Member visibility cannot exceed containing type visibility"
