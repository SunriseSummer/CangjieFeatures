keywords:
  declaration:
    - let           # immutable binding
    - var           # mutable binding
    - const         # compile-time constant
    - func
    - class
    - struct
    - enum
    - interface
    - extend        # type extension
    - type          # type alias
    - macro
    - package
    - import
    - init          # constructor
    - prop          # property
    - main          # entry point, no func keyword needed
    - operator      # operator function
  modifiers:
    - public        # visible everywhere
    - private       # visible only in same file
    - internal      # same package + subpackages (default)
    - protected     # same module + subclass bodies
    - open          # allows subclass override
    - override      # overrides parent instance member
    - redef         # redefines parent static member
    - abstract      # no implementation, must be overridden
    - static        # belongs to type, not instance
    - sealed        # restricts inheritance/implementation to same package
    - mut           # mutable property or struct-mutating function
  control_flow:
    - if / else
    - match / case
    - where         # pattern guard / generic constraint
    - for / in
    - while / do
    - break / continue
    - return
    - throw / try / catch / finally
    - spawn         # create lightweight thread
    - synchronized  # synchronized block/expression
  type_keywords:
    - Bool / Rune
    - Int8 / Int16 / Int32 / Int64 / IntNative
    - UInt8 / UInt16 / UInt32 / UInt64 / UIntNative
    - Float16 / Float32 / Float64
    - Array / VArray / String
    - Nothing / Unit
  type_related:
    - is            # runtime type check → Bool
    - as            # safe type cast → Option<T>
    - this / super  # current / parent instance
    - This          # self-referential return type
    - true / false
  ffi:
    - foreign       # foreign C function declaration
    - unsafe        # unsafe block for FFI
    - inout         # pass-by-reference to C function
  macro:
    - macro / quote # macro declaration / quote expression

identifiers:
  rules:
    - "Start with letter or _; followed by letters, digits, _"
    - "Unicode letters allowed"
  raw_identifier: "`keyword`"  # backticks escape keywords as identifiers

operators:
  precedence:  # highest → lowest
    - { level:  1, ops: ["@"],                                     assoc: right, desc: "Macro/annotation" }
    - { level:  2, ops: [".", "?.", "?[", "?(", "?{"],             assoc: left,  desc: "Member access / optional chaining" }
    - { level:  3, ops: ["()", "[]"],                              assoc: left,  desc: "Call / subscript" }
    - { level:  4, ops: ["++", "--"],                              assoc: right, desc: "Postfix inc/dec" }
    - { level:  5, ops: ["!", "-", "~"],                           assoc: right, desc: "Prefix NOT / negate / bitwise NOT" }
    - { level:  6, ops: ["**"],                                    assoc: right, desc: "Exponentiation" }
    - { level:  7, ops: ["*", "/", "%"],                           assoc: left,  desc: "Multiplicative" }
    - { level:  8, ops: ["+", "-"],                                assoc: left,  desc: "Additive" }
    - { level:  9, ops: ["<<", ">>"],                              assoc: left,  desc: "Bitwise shift" }
    - { level: 10, ops: ["..", "..="],                             assoc: none,  desc: "Range [start,end) / [start,end]" }
    - { level: 11, ops: ["<", "<=", ">", ">="],                   assoc: none,  desc: "Comparison" }
    - { level: 12, ops: ["==", "!="],                              assoc: none,  desc: "Equality" }
    - { level: 13, ops: ["&"],                                     assoc: left,  desc: "Bitwise AND" }
    - { level: 14, ops: ["^"],                                     assoc: left,  desc: "Bitwise XOR" }
    - { level: 15, ops: ["|"],                                     assoc: left,  desc: "Bitwise OR" }
    - { level: 16, ops: ["&&"],                                    assoc: left,  desc: "Logical AND (short-circuit)" }
    - { level: 17, ops: ["||"],                                    assoc: left,  desc: "Logical OR (short-circuit)" }
    - { level: 18, ops: ["??"],                                    assoc: right, desc: "None coalescing" }
    - { level: 19, ops: ["|>"],                                    assoc: left,  desc: "Pipeline: x |> f ≡ f(x)" }
    - { level: 20, ops: ["~>"],                                    assoc: left,  desc: "Composition: f ~> g ≡ { x => g(f(x)) }" }
    - { level: 21, ops: ["=","+=","-=","*=","/=","%=","**=","<<=",">>=","&=","|=","^=","&&=","||="], assoc: right, desc: "Assignment" }

  overloadable:
    unary: ["!", "-", "~"]
    binary: ["+", "-", "*", "/", "%", "**", "<<", ">>", "&", "|", "^", "==", "!=", "<", "<=", ">", ">="]
    subscript: "[] — single operator for get/set; setter uses named param value!"
    call: "()"

literals:
  Int:
    examples: ["42", "0xFF", "0o77", "0b1010", "1_000_000"]
    suffixes: [i8, i16, i32, "i64 (default)", u8, u16, u32, u64]
  Float:
    examples: ["3.14", "2.5e10", "1.0f32"]
    suffixes: [f32, "f64 (default)"]
  Bool: [true, false]
  Rune: ["'A'", "'\\n'", "'\\u{1F600}'"]
  String:
    single_line: '"Hello, ${name}!"'        # ${expr} interpolation; single quotes also supported
    multi_line: '"""triple-quoted"""'        # preserves content including indentation
    raw: '#"raw \n not escaped"#'           # ##"can contain "# inside"##
    byte: "b'A'"                            # UInt8 byte literal
  Array: "[1, 2, 3]"
  Tuple: "(1, true, 3.0)"
  Range:
    - "1..5"    # [1,5)
    - "1..6:2"  # 1, 3, 5
    - "1..=5"   # [1,5]
  Unit: "()"
