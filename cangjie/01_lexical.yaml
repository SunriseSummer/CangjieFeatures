keywords:
  declaration:
    - let           # immutable binding
    - var           # mutable binding
    - const         # compile-time constant
    - func
    - class
    - struct
    - enum
    - interface
    - extend        # type extension
    - type          # type alias
    - macro
    - package
    - import
    - init          # constructor
    - prop          # property
    - main          # entry point (no func keyword needed)
    - operator      # operator function
  modifiers:
    - public        # visible everywhere
    - private       # same file only
    - internal      # same package + subpackages (default)
    - protected     # same module + subclass bodies
    - open          # allows override in subclass
    - override      # overrides parent instance member
    - redef         # redefines parent static member
    - abstract      # no implementation, must be overridden
    - static        # belongs to type, not instance
    - sealed        # restricts inheritance/implementation to same package
    - mut           # mutable property or struct-mutating function
  control_flow:
    - if / else
    - match / case
    - where         # pattern guard / generic constraint
    - for / in
    - while / do
    - break / continue / return
    - throw / try / catch / finally
    - spawn         # create lightweight thread
    - synchronized
  type_keywords:
    - Bool / Rune
    - Int8 / Int16 / Int32 / Int64 / IntNative
    - UInt8 / UInt16 / UInt32 / UInt64 / UIntNative
    - Float16 / Float32 / Float64
    - Array / VArray / String
    - Nothing / Unit
  type_related:
    - "is            # type check → Bool"
    - "as            # type cast → Option<T>"
    - "this / super  # instance / parent reference"
    - "This          # self-referential return type"
    - true / false
  ffi: [foreign, unsafe, inout]
  macro: [macro, quote]

identifiers:
  rules: "Start with letter or _, followed by letters/digits/_; Unicode allowed"
  raw_identifier: "`keyword`"

operators:
  by_precedence:
    - { level:  1, ops: ["@"],                                       assoc: right, note: "Macro/annotation" }
    - { level:  2, ops: [".", "?.", "?[", "?(", "?{"],               assoc: left,  note: "Member access / optional chaining" }
    - { level:  3, ops: ["()", "[]"],                                assoc: left,  note: "Call / subscript" }
    - { level:  4, ops: ["++", "--"],                                assoc: right, note: "Postfix inc/dec" }
    - { level:  5, ops: ["!", "-", "~"],                             assoc: right, note: "Prefix: NOT / negate / bitwise NOT" }
    - { level:  6, ops: ["**"],                                      assoc: right, note: "Exponentiation" }
    - { level:  7, ops: ["*", "/", "%"],                             assoc: left,  note: "Multiplicative" }
    - { level:  8, ops: ["+", "-"],                                  assoc: left,  note: "Additive" }
    - { level:  9, ops: ["<<", ">>"],                                assoc: left,  note: "Bitwise shift" }
    - { level: 10, ops: ["..", "..="],                               assoc: none,  note: "Range [start,end) / [start,end]" }
    - { level: 11, ops: ["<", "<=", ">", ">="],                     assoc: none,  note: "Comparison" }
    - { level: 12, ops: ["==", "!="],                                assoc: none,  note: "Equality" }
    - { level: 13, ops: ["&"],                                       assoc: left,  note: "Bitwise AND" }
    - { level: 14, ops: ["^"],                                       assoc: left,  note: "Bitwise XOR" }
    - { level: 15, ops: ["|"],                                       assoc: left,  note: "Bitwise OR" }
    - { level: 16, ops: ["&&"],                                      assoc: left,  note: "Logical AND (short-circuit)" }
    - { level: 17, ops: ["||"],                                      assoc: left,  note: "Logical OR (short-circuit)" }
    - { level: 18, ops: ["??"],                                      assoc: right, note: "None coalescing" }
    - { level: 19, ops: ["|>"],                                      assoc: left,  note: "Pipeline: x |> f ≡ f(x)" }
    - { level: 20, ops: ["~>"],                                      assoc: left,  note: "Composition: f ~> g ≡ { x => g(f(x)) }" }
    - { level: 21, ops: ["=", "+=", "-=", "*=", "/=", "%=", "**=", "<<=", ">>=", "&=", "|=", "^=", "&&=", "||="], assoc: right, note: "Assignment" }

  overloadable:
    unary: ["!", "-", "~"]
    binary: ["+", "-", "*", "/", "%", "**", "<<", ">>", "&", "|", "^", "==", "!=", "<", "<=", ">", ">="]
    subscript: "[] (get and set; setter uses named parameter value!)"
    call: "()"

literals:
  Int:
    examples: ["42", "0xFF", "0o77", "0b1010", "1_000_000"]
    suffixes: [i8, i16, i32, "i64 (default)", u8, u16, u32, u64]
  Float:
    examples: ["3.14", "2.5e10", "1.0f32"]
    suffixes: [f32, "f64 (default)"]
  Bool: [true, false]
  Rune: ["'A'", "'\\n'", "'\\u{1F600}'"]
  String:
    single_line: '"Hello, ${name}!"'
    single_quote: "'Hello, ${name}!'"
    multi_line: |
      """
      multi-line string
      supports ${interpolation}
      """
    raw: '#"raw string \n not escaped"#'
    byte_literal: "b'A'  → UInt8"
  Array: "[1, 2, 3]"
  Tuple: "(1, true, 3.0)"
  Range:
    - "1..5     # [1,5)"
    - "1..6:2   # 1, 3, 5"
    - "1..=5    # [1,5]"
  Unit: "()"
