match_expression:
  with_value:
    syntax: |
      match (expr) {
          case pattern1 => result1
          case pattern2 where guard => result2
          case _ => defaultResult
      }
    rules:
      - "Returns a value; last expression in matched case is the result"
      - "Top-to-bottom, first match wins, no fall-through"
      - "Must be exhaustive; use _ for catch-all"

  without_value:
    syntax: |
      match {
          case boolExpr1 => result1
          case _ => default
      }
    note: "Each case accepts a Bool expression; _ means true"

  combined: "case 1 | 2 | 3 => \"small\""

  type_rules:
    - "With context type: branches must be subtype of expected type"
    - "Without context type: least common supertype of all branches"
    - "Value unused: type is Unit"

pattern_types:
  constant:
    syntax: "case 42 =>"
    types: "Integer, Float, Bool, Rune, String literals (no interpolation), Unit"
    combined: "case 0 | 10 | 20 => ..."
  wildcard: "case _ =>  // matches anything, binds nothing"
  binding: "case x =>  // matches anything, binds to x; cannot combine with |"
  tuple:
    syntax: "case (p1, p2, ...) =>"
    example: |
      match (("Alice", 24)) {
          case ("Bob", age) => "Bob is ${age}"
          case ("Alice", age) => "Alice is ${age}"
          case (_, _) => "someone"
      }
  type_pattern: "case x: Type =>  // matches if runtime type is subtype of Type"
  enum_pattern: |
    match (shape) {
        case Circle(r) => 3.14159 * r * r
        case Rectangle(w, h) => w * h
        case Point => 0.0
    }

pattern_guards:
  syntax: "case pattern where boolExpr =>"
  note: "Uses where, not if"
  example: |
    match (x) {
        case n where n > 0 => "positive"
        case n where n < 0 => "negative"
        case _ => "zero"
    }

nested_patterns: |
  match (expr) {
      case Add(Num(a), Num(b)) => a + b
      case Neg(Num(n)) => -n
      case _ => 0
  }

if_let:
  syntax: |
    if (let pattern <- expression) {
        // bindings available
    }
  multi_condition: |
    if (let Num(x) <- a && let Num(y) <- b) { println("sum = ${x + y}") }
    if (let Num(n) <- a && n > 0) { println("positive: ${n}") }
  or_condition: |
    if (let Num(_) <- a || let Num(_) <- b) { /* no bindings with || */ }
  restrictions:
    - "Use && for additional checks (not where)"
    - "|| patterns cannot have variable bindings"

while_let: |
  while (let Active(n) <- s) {
      println(n)
      s = if (n < 3) { Active(n + 1) } else { Done }
  }

pattern_in_let:
  syntax: "let (x, y) = (1, 2)"
  note: "Only irrefutable patterns allowed in let bindings"

pattern_in_for: |
  for ((key, value) in pairs) {
      println("${key} = ${value}")
  }

refutability:
  irrefutable: "Always matches — _, x, (x, _), single-constructor enum"
  refutable: "May fail — constants, type patterns, multi-constructor enum patterns"
