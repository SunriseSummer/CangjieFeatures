match_expr:
  with_value:
    syntax: |
      match (expr) {
          case pattern1 => result1
          case pattern2 where guard => result2
          case _ => defaultResult
      }
    rules:
      - "Returns a value; last expression in matched case is result"
      - "Top-to-bottom, first match wins, no fall-through"
      - "Must be exhaustive; use _ as catch-all"

  without_value: |
    match {
        case boolExpr1 => result1
        case _ => default
    }
    // Each case accepts Bool expression; _ means true

  combined: "case 1 | 2 | 3 => \"small\""

  type_rules:
    - "With context type: each branch body must be subtype of expected type"
    - "Without context type: type is least common supertype of all branches"
    - "Value unused: type is Unit"

patterns:
  constant:
    syntax: "case 42 =>"
    types: "Int, Float, Bool, Rune, String literals (no interpolation), Unit"
    combined: "case 0 | 10 | 20 => ..."
  wildcard: "case _ =>  // matches anything, binds nothing"
  binding: "case x =>  // matches anything, binds to x; cannot combine with |"
  tuple: |
    match (("Alice", 24)) {
        case ("Bob", age) => "Bob is ${age}"
        case ("Alice", age) => "Alice is ${age}"
        case (_, _) => "someone"
    }
  type: |
    case s: String =>  // matches if runtime type is subtype, binds to s
  enum: |
    case Circle(r) => 3.14159 * r * r
    case Rectangle(w, h) => w * h

guards:
  syntax: "case pattern where boolExpr =>"
  note: "Cangjie uses where (not if) for guards"
  example: |
    match (x) {
        case n where n > 0 => "positive"
        case n where n < 0 => "negative"
        case _ => "zero"
    }

nested: |
  match (expr) {
      case Add(Num(a), Num(b)) => a + b
      case Neg(Num(n)) => -n
      case _ => 0
  }

if_let:
  syntax: |
    if (let pattern <- expression) {
        // bindings available here
    }
  multi_condition: |
    if (let Num(x) <- a && let Num(y) <- b) { ... }
    if (let Num(n) <- a && n > 0) { ... }
  or_condition: |
    if (let Num(_) <- a || let Num(_) <- b) { ... }
    // || patterns cannot have variable bindings
  rules:
    - "Use && (not where) for additional checks"
    - "Bound variables only in if branch, not else"

while_let: |
  while (let Active(n) <- s) {
      println(n)
      s = if (n < 3) { Active(n + 1) } else { Done }
  }

pattern_in_let: |
  let (x, y) = (1, 2)           // tuple destructuring
  let (_, second) = getTuple()   // discard first
  // Only irrefutable patterns allowed

pattern_in_for: |
  for ((key, value) in pairs) { println("${key} = ${value}") }

refutability:
  irrefutable: "Always matches — wildcard _, binding x, tuple of irrefutable; used in let, for-in"
  refutable: "May fail — constants, type patterns, multi-constructor enum; used in match, if-let, while-let"
