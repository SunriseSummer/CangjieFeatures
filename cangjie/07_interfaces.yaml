definition:
  syntax: |
    interface InterfaceName {
        func abstractMethod(): Type
        func defaultMethod(): Type { /* default impl */ }
        prop abstractProp: Type
        static func staticMethod(): Type
        operator func <(rhs: T): Bool
    }
  example: |
    interface Printable {
        func display(): String
    }
    interface Serializable {
        func serialize(): Array<Byte>
        func deserialize(data: Array<Byte>): Unit { /* default */ }
    }

members:
  abstract: "func draw(): Unit                      // no body = abstract"
  default: "func log(): Unit { println(this.toString()) }"
  abstract_property: "prop name: String / mut prop nickname: String"
  static: "static func create(): T / static func version(): String { \"1.0\" }"
  operator: "operator func <(rhs: T): Bool"

implementation:
  by_class: |
    class MyClass <: Interface1 & Interface2 {
        public func requiredMethod(): Type { ... }
    }
  by_struct: |
    struct Counter <: Resettable {
        var n: Int64 = 0
        public mut func reset(): Unit { n = 0 }
    }
  by_extension: |
    extend ExistingType <: InterfaceName {
        public func requiredMethod(): Type { ... }
    }

inheritance:
  single: "interface AdvancedDrawable <: Drawable { ... }"
  multiple: "interface ReadWriteStream <: InputStream & OutputStream { ... }"
  diamond: "Conflicting defaults must be overridden by implementer"

mut_function_rules:
  class: "Ignores mut modifier — class methods can always modify state"
  struct: "Must exactly match mut modifier"

sealed_interface:
  syntax: "sealed interface Shape { func area(): Float64 }"
  rule: "Only types in same package can implement"

any_interface: "Built-in top interface; all non-interface types implicitly implement Any"

access_rules:
  members: "Default to public; must be implemented as public"
  constraint: "All implemented members must be at least as visible as the interface"
