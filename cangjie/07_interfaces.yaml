definition:
  example: |
    interface Printable {
        func display(): String
    }
    interface Serializable {
        func serialize(): Array<Byte>
        func deserialize(data: Array<Byte>): Unit {
            // default implementation
        }
    }

members:
  abstract: "func draw(): Unit"
  default: |
    func log(): Unit { println(this.toString()) }
  abstract_property: |
    prop name: String             // abstract getter
    mut prop nickname: String     // abstract getter + setter
  static: |
    static func create(): T      // static abstract
    static func version(): String { "1.0" }  // static default
  operator: |
    operator func <(rhs: T): Bool
    operator func ==(rhs: T): Bool

implementation:
  by_class: |
    class MyClass <: Interface1 & Interface2 & Interface3 {
        public func requiredMethod(): Type { ... }
    }
  by_struct: |
    struct Counter <: Resettable {
        var n: Int64 = 0
        public mut func reset(): Unit { n = 0 }
    }
  by_extension: |
    extend ExistingType <: InterfaceName {
        public func requiredMethod(): Type { ... }
    }

inheritance:
  single: "interface AdvancedDrawable <: Drawable { ... }"
  multiple: "interface ReadWriteStream <: InputStream & OutputStream { ... }"
  diamond: "Conflicting defaults must be overridden by implementor"

mut_rules:
  class: "Ignores mut modifier — class methods always modify state"
  struct: "Must exactly match: mut ↔ mut, non-mut ↔ non-mut"

sealed:
  syntax: "sealed interface Shape { func area(): Float64 }"
  rule: "Only types in same package can implement"

Any:
  desc: "Built-in top interface; all non-interface types implicitly implement Any"

access:
  - "Members default to public; must be implemented as public"
  - "Implemented members must be at least as visible as the interface"
