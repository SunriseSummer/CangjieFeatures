structure:
  package: "Minimum compilation unit with its own namespace"
  module: "Collection of packages; minimum distribution unit"
  layout: |
    project_root/
    ├── cjpm.toml
    └── src/
        ├── main.cj            # root package "default"
        ├── utils/
        │   └── helper.cj      # package default.utils
        └── models/
            └── user.cj        # package default.models

package_declaration:
  syntax: "package packageName / package parent.child"
  rules:
    - "First non-comment statement in file"
    - "Must match relative path from src/"
    - "Files without declaration belong to 'default' package"

imports:
  basic: "import pkg.ItemName / import pkg.*"
  grouped: "import { pkg1.Foo, pkg2.Bar } / import pkg.{ Foo, Bar }"
  renaming: "import pkg.VeryLongName as Short"
  re_export: "public import pkg.*"
  rules:
    - "After package declaration, before other declarations"
    - "No circular dependencies"
    - "Imported names have lower precedence than local declarations"
  core: "String, Array, Range, Int64, Bool, Option, println, etc. are implicit"

visibility:
  private: "same file only"
  internal: "same package + subpackages (default)"
  protected: "same module + subclass bodies"
  public: "everywhere"
  defaults:
    package_declaration: public
    import_declaration: private
    type_declarations: internal
    type_members: internal
  constraint: "Declaration visibility cannot exceed the visibility of types it uses"

main_entry:
  signatures:
    - "main(): Int64 { ... }"
    - "main(): Unit { ... }"
    - "main(args: Array<String>): Int64 { ... }"
    - "main(args: Array<String>): Unit { ... }"
  rules: "At most one per package; no access modifier; no func keyword needed"

project_management:
  tool: cjpm
  config: cjpm.toml
  commands:
    init: cjpm init
    build: cjpm build
    run: cjpm run
    test: cjpm test
    clean: cjpm clean
  config_example: |
    [package]
    name = "myapp"
    cjc-version = "1.0.5"
    output-type = "executable"
    [dependencies]
