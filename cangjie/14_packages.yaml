structure:
  package: "Minimum compilation unit with own namespace; at most one main()"
  module: "Collection of packages; minimum distribution unit"
  layout: |
    project_root/
    ├── cjpm.toml
    └── src/
        ├── main.cj          # root package "default"
        ├── utils/
        │   └── helper.cj    # package default.utils
        └── models/
            └── user.cj      # package default.models

declaration:
  syntax: |
    package packageName        // simple/root
    package parent.child       // nested
  rules:
    - "Must be first non-comment statement"
    - "Must match relative path from src/"
    - "Files without declaration belong to 'default' package"

imports:
  basic: "import pkg.ItemName; import pkg.*"
  grouped: "import { pkg1.Foo, pkg2.Bar }; import pkg.{ Foo, Bar }"
  renaming: "import longPkgName as short; import pkg.VeryLongName as Short"
  re_export: "public import pkg.*"
  rules:
    - "After package declaration, before other declarations"
    - "No circular dependencies"
    - "Imported names have lower precedence than local declarations"
  core: "String, Array, Range, Int64, Bool, Option, println, etc. — implicitly imported"

visibility:
  private: "Same source file only"
  internal: "Same package + subpackages (default)"
  protected: "Same module + subclass bodies"
  public: "Everywhere"
  defaults:
    package_declaration: public
    import_declaration: private
    type_and_members: internal
  constraint: "Declaration visibility cannot exceed visibility of types it references"

main:
  signatures:
    - "main(): Int64 { ... }"
    - "main(): Unit { ... }"
    - "main(args: Array<String>): Int64 { ... }"
    - "main(args: Array<String>): Unit { ... }"
  rules: "At most one per package; no access modifier; no func keyword"

cjpm:
  config: cjpm.toml
  commands:
    init: "cjpm init"
    build: "cjpm build"
    run: "cjpm run"
    test: "cjpm test"
    clean: "cjpm clean"
  config_example: |
    [package]
    name = "myapp"
    cjc-version = "1.0.5"
    output-type = "executable"
    [dependencies]
