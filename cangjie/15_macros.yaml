overview:
  description: "Compile-time code transformation on token sequences and/or AST nodes"
  import: "import std.ast.*"

macro_packages:
  declaration: "macro package myMacros"
  rules:
    - "Can only export public macros"
    - "Compiled separately: cjc files --compile-macro"
  cjpm_config: 'output-type = "macro"'

tokens:
  Token:
    construction: |
      Token(TokenKind.IDENTIFIER, "myVar")
      Token(TokenKind.INTEGER_LITERAL, "42")
      Token(TokenKind.ADD)
    properties: [kind, value, position]
  Tokens:
    construction: "Tokens() / Tokens([token1, token2])"
    operations: "size / [i] / tokens1 + tokens2 / dump() / toString()"

quote:
  syntax: "quote( ... cangjie code ... )"
  interpolation: |
    let name = Token(TokenKind.IDENTIFIER, "x")
    let code = quote(let $(name) = 42)
  escaping: '"\(" / "\)" / "\$" / "\@"'
  interpolation_types: "$(expr) accepts Token, Tokens, AST nodes, primitives, Array/ArrayList of above"

definition:
  non_attribute: |
    public macro MyMacro(input: Tokens): Tokens {
        return resultTokens
    }
    // @MyMacro(some code here)
  attribute: |
    public macro MyAttr(input: Tokens, attrs: Tokens): Tokens {
        // input: annotated declaration; attrs: macro arguments
        return transformedTokens
    }
    // @MyAttr[arg1, arg2]
    // class MyClass { ... }

ast_nodes:
  base_classes: [Node, Expr, Decl, TypeNode, Pattern]
  parsing: [parseExpr(tokens), parseDecl(tokens), parseType(tokens), parsePattern(tokens)]
  common: "BinaryExpr, FuncDecl, ClassDecl, VarDecl"
  example: |
    public macro DoubleCall(input: Tokens): Tokens {
        let expr = parseExpr(input)
        quote($(expr); $(expr))
    }

nesting: "Macros can call other macros; inner macros expanded after outer returns"
