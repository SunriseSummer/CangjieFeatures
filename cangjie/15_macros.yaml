overview:
  desc: "Compile-time code transformation on token sequences and/or AST nodes"
  import: "import std.ast.*"

macro_packages:
  declaration: "macro package myMacros"
  rules: ["Can only export public macros", "Other public declarations cause errors"]
  build: |
    # cjpm.toml: output-type = "macro"
    # or: cjc files --compile-macro

tokens:
  Token:
    construction: |
      Token(TokenKind.IDENTIFIER, "myVar")
      Token(TokenKind.INTEGER_LITERAL, "42")
      Token(TokenKind.ADD)
    properties: ["kind: TokenKind", "value: String"]
  Tokens:
    construction: "Tokens(); Tokens([t1, t2])"
    operations: "size, [i], +, dump(), toString()"

quote:
  syntax: "quote( ... cangjie code ... )"
  interpolation: |
    let name = Token(TokenKind.IDENTIFIER, "x")
    let code = quote(let $(name) = 42)  // → let x = 42
  escaping: ['"\(" → literal (', '"\)" → literal )', '"\$" → literal $', '"\@" → literal @']
  accepts: "$(expr) — Token, Tokens, AST nodes, primitives, Array/ArrayList of above"

definition:
  non_attribute: |
    public macro MyMacro(input: Tokens): Tokens {
        return resultTokens
    }
    // @MyMacro(some code here)
  attribute: |
    public macro MyAttr(input: Tokens, attrs: Tokens): Tokens {
        // input: annotated declaration; attrs: macro arguments
        return transformedTokens
    }
    // @MyAttr[arg1, arg2]
    // class MyClass { ... }

ast:
  base_classes: [Node, Expr, Decl, TypeNode, Pattern]
  parsing: ["parseExpr(tokens)", "parseDecl(tokens)", "parseType(tokens)", "parsePattern(tokens)"]
  example: |
    public macro DoubleCall(input: Tokens): Tokens {
        let expr = parseExpr(input)
        quote($(expr); $(expr))
    }
    // @DoubleCall(println("hi")) → println("hi"); println("hi")

nesting: "Macros can call other macros; inner macros expanded after outer returns"
