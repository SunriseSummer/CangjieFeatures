semantic_rules:
  global:
    - id: top_level_names_unique_except_overloads
      op: top_level_symbols_unique_except_valid_overloads
      applies_to: top_level_scope
      severity: error
      message: Top-level names must be unique unless they form a valid overload set.

    - id: references_must_resolve
      op: symbol_resolves
      applies_to: all_symbol_references
      severity: error
      message: Every referenced type, package, constructor, and declaration must resolve.

    - id: control_blocks_produce_expression_values
      op: block_value_is_last_expression
      applies_to: [function_body, if_branch, match_case, loop_body]
      severity: info
      message: Block-like forms evaluate to the type and value of the last executed expression when applicable.

    - id: no_implicit_type_conversions
      op: type_conversion_explicit_only
      applies_to: all_expressions
      severity: error
      message: Cangjie has no implicit type conversions. Use constructor syntax T(expr) or explicit methods.

    - id: assignment_is_not_an_expression
      op: assignment_statement_only
      applies_to: assignment
      severity: error
      message: Assignment does not produce a value; it cannot be used inside an expression.

    - id: break_continue_return_throw_are_nothing
      op: type_is_nothing
      applies_to: [break, continue, return, throw]
      severity: info
      message: These expressions have type Nothing. Code after them in the same block is unreachable.

    - id: rune_arithmetic_disallowed
      op: disallow_arithmetic_on_rune
      applies_to: Rune
      severity: error
      diagnostic: rune_no_arithmetic
      message: Rune does not support arithmetic operations. Convert to UInt32 first.

    - id: static_instance_name_conflict
      op: member_name_conflict_disallowed
      applies_to: [class, struct]
      severity: error
      message: A type cannot have a static member and an instance member with the same name.

    - id: string_for_in_iterates_bytes
      op: iteration_semantics
      applies_to: String
      severity: info
      message: "for-in on String iterates bytes (UInt8). Use .runes() to iterate characters (Rune)."

lint_rules:
  - id: prefer_explicit_return_for_complex_functions
    op: style_preference
    target: function_decl
    severity: info
    message: Complex function bodies are easier to read with explicit return statements.

  - id: qualify_enum_constructor_on_name_conflict
    op: style_preference
    target: enum_use_site
    severity: info
    message: Use TypeName.Constructor when a constructor name may conflict with local names.

  - id: prefer_option_chaining_over_nested_if_let
    op: style_preference
    target: option_type
    severity: info
    message: Prefer ?. and ?? over nested if-let for accessing Option values.

  - id: prefer_try_with_resources
    op: style_preference
    target: error_handling
    severity: info
    message: Prefer try-with-resources over manual try/finally for Resource implementations.

  - id: prefer_for_in_over_manual_iterator
    op: style_preference
    target: for_in_loop
    severity: info
    message: Prefer for-in over manual while + iterator.next() pattern.

  - id: prefer_where_clause_over_inner_if
    op: style_preference
    target: for_in_loop
    severity: info
    message: Prefer where clause in for-in over if-guard inside loop body for filtering.

  - id: use_wait_until_for_condition
    op: style_preference
    target: concurrency
    severity: info
    message: Prefer waitUntil(predicate) over manual while + wait() loop to avoid spurious wakeups.

diagnostics:
  # --- Module ---
  - id: package_must_be_first
    severity: error
    message: Package declaration must be the first non-comment line in a source file.

  - id: package_path_mismatch
    severity: error
    message: Package declaration must match the source directory path.

  - id: import_before_declarations
    severity: error
    message: Import declarations must appear after package and before other declarations.

  # --- Naming ---
  - id: duplicate_top_level_symbol
    severity: error
    message: Duplicate symbol detected in a scope that does not permit that conflict.

  # --- Bindings ---
  - id: local_variable_uninitialized
    severity: error
    message: Binding requires either a valid initializer or a statically permitted deferred initialization path.

  # --- Control flow conditions ---
  - id: if_condition_not_bool
    severity: error
    message: if condition expression must have type Bool.

  - id: while_condition_not_bool
    severity: error
    message: while condition expression must have type Bool.

  - id: for_in_requires_iterable
    severity: error
    message: The sequence expression in for-in must implement Iterable.

  - id: match_not_exhaustive
    severity: error
    message: Match expression must cover all possible cases.

  # --- Types ---
  - id: struct_recursive_field
    severity: error
    message: Structs may not contain directly or indirectly recursive value fields.

  - id: interface_member_not_implemented
    severity: error
    message: A non-abstract implementing type must provide all required interface or abstract members.

  - id: generic_constraint_invalid
    severity: error
    message: Generic constraint is malformed or uses an unsupported upper bound.

  - id: type_alias_cycle
    severity: error
    message: Type alias forms a cycle and cannot be resolved.

  - id: rune_no_arithmetic
    severity: error
    message: Rune does not support arithmetic operations. Convert to UInt32 first.

  - id: let_struct_cannot_call_mut
    severity: error
    message: mut methods on a struct require a var binding; a let-bound struct value cannot call them.

  # --- Extensions ---
  - id: extend_cannot_add_stored_field
    severity: error
    message: Extend blocks cannot add stored member variables to the extended type.

  # --- Error handling ---
  - id: throw_requires_exception_subtype
    severity: error
    message: throw expression requires a value whose type is a subtype of Exception.

  - id: uncaught_exception
    severity: warning
    message: Exception may propagate without a matching catch clause.

  # --- C FFI ---
  - id: unsafe_context_required
    severity: error
    message: This operation requires an unsafe block or unsafe function context.

  - id: foreign_param_not_ctype
    severity: error
    message: Parameters and return types of foreign functions must be C-compatible types (CType).

  # --- Annotations ---
  - id: annotation_target_mismatch
    severity: error
    message: Annotation applied to a target kind it does not support.
