type_hierarchy:
  top: "Any — all non-interface types are subtypes"
  bottom: "Nothing — subtype of all types; no value can have type Nothing"
  object_root: "Object — root of all class types"
  relationships:
    - "Nothing <: T (for any T)"
    - "T <: Any (for any non-interface T)"
    - "class <: Object"
    - "T <: T (reflexive)"

built_in_types:
  integers:
    signed: [Int8, Int16, Int32, Int64]
    unsigned: [UInt8, UInt16, UInt32, UInt64]
    default: Int64
    note: "No implicit widening; use Int64(myInt8)"
  floating_point:
    types: [Float16, Float32, Float64]
    default: Float64
    special_values: [NaN, infinity, negInfinity]
  Bool: [true, false]
  Rune:
    description: "Unicode scalar value"
    conversion: |
      let code = UInt32(myRune)
      let ch = Rune(65)           // 'A'
  String:
    description: "UTF-8, immutable"
    interpolation: '"Hello, ${expr}!"'
    multiline: '"""triple-quoted"""'
    indexing: "s[i] → UInt8; for (b in s) iterates bytes; s.runes() for Rune iteration"
  Unit:
    value: "()"
    description: "Single-value type; void-like return"
  Nothing: "Bottom type; type of throw and infinite loops"
  tuple:
    syntax: "(T1, T2, ..., Tn)"
    access: "t[0], t[1], ..."
    destructuring: "let (a, b) = (1, 2)"
    subtyping: "covariant — (Sub1, Sub2) <: (Super1, Super2)"
  array:
    Array:
      create: "Array<Int64>(5, repeat: 0)"
      literal: "[1, 2, 3]"
      note: "Reference type; fixed size after creation"
    VArray:
      type: "VArray<T, $N>"
      create: "VArray<Int64, $3>(repeat: 0)"
      note: "Fixed-size value-type array; N is compile-time constant"
  range:
    type: "Range<T> where T <: Countable<T>"
    inclusive_start: "start..end    # [start, end)"
    fully_inclusive: "start..=end   # [start, end]"
  function_types:
    syntax: "(ParamTypes) -> ReturnType"
    examples: ["(Int64) -> Bool", "(Int64, String) -> Unit", "() -> Int64"]
    subtyping: "(Super) -> Sub <: (Sub) -> Super"
  Option:
    sugar: "?T ≡ Option<T>"
    constructors: [Some(value), None]
    auto_wrapping: "T auto-wrapped to Some(T) where ?T expected"
    operators:
      coalesce: "opt ?? defaultValue"
      chain: "opt?.property / opt?[i] / opt?(arg)"
      unwrap: "opt.getOrThrow()"

type_conversions:
  numeric: |
    No implicit widening/narrowing:
      let x: Int64 = Int64(myInt8)
      let y: Float64 = Float64(myInt32)
  rune: |
    let ch: Rune = 'A'
    let code = UInt32(ch)  // 65
    let ch2 = Rune(65)    // 'A'
  type_check:
    syntax: "expr is Type → Bool"
  type_cast:
    syntax: "expr as Type → Option<Type>"

subtyping_rules:
  class_inheritance: "Sub <: Super"
  interface_impl: "T <: I (via class T <: I or extend T <: I)"
  tuple: "covariant in all positions"
  function: "contravariant in params, covariant in return"
  generic_user_types: "invariant — Box<Sub> is NOT a subtype of Box<Super>"
  transitivity: "A <: B and B <: C ⇒ A <: C"

type_aliases:
  syntax: "type Alias = OriginalType"
  generic: "type Pair<T> = (T, T)"
  rules:
    - "Top-level only; no circular references"
    - "Fully interchangeable with original; cannot be used in type-cast"
