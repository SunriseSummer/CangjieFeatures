generic_functions:
  basic: "func identity<T>(x: T): T { x }"
  constrained: |
    func max<T>(a: T, b: T): T where T <: Comparable<T> {
        if (a > b) { a } else { b }
    }
  multi_param: "func zip<A, B>(a: Array<A>, b: Array<B>): Array<(A, B)> { ... }"

generic_classes:
  syntax: |
    class Box<T> {
        var value: T
        public init(v: T) { value = v }
        public func get(): T { value }
    }
  constrained: "class SortedList<T> where T <: Comparable<T> { ... }"
  static_limitation: "Static members cannot reference type parameters"

generic_structs: |
  struct Pair<A, B> {
      let first: A
      let second: B
      public init(first: A, second: B) {
          this.first = first; this.second = second
      }
  }

generic_interfaces: |
  interface Container<T> {
      func add(item: T): Unit
      func get(index: Int64): T
      prop size: Int64
  }
  interface MutableContainer<T> <: Container<T> {
      func remove(index: Int64): T
  }

generic_enums: |
  enum Option<T> { | Some(T) | None }
  enum Result<T, E> { | Ok(T) | Err(E) }

constraints:
  interface_bound: "where T <: InterfaceName"
  class_bound: "where T <: ClassName (only one class constraint per param)"
  multiple_bounds: "where T <: Interface1 & Interface2 & Interface3"
  multi_param: "where K <: Hashable & Equatable<K>, V <: ToString"

variance:
  user_defined: "Invariant — Box<Sub> is NOT a subtype of Box<Super>"
  tuple: "Covariant — (Sub1, Sub2) <: (Super1, Super2)"
  function: "Contravariant params, covariant return — (Super) -> Sub <: (Sub) -> Super"

instantiation:
  explicit: "let b = Box<Int64>(42)"
  inferred: "let b = Box(42)"
  partial: "Not supported — all type parameters must be resolved"
