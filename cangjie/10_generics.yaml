functions: |
  func identity<T>(x: T): T { x }
  func max<T>(a: T, b: T): T where T <: Comparable<T> {
      if (a > b) { a } else { b }
  }

classes: |
  class Box<T> {
      var value: T
      public init(v: T) { value = v }
      public func get(): T { value }
  }
  // Static members cannot reference type params

structs: |
  struct Pair<A, B> {
      let first: A
      let second: B
      public init(first: A, second: B) {
          this.first = first; this.second = second
      }
  }

interfaces: |
  interface Container<T> {
      func add(item: T): Unit
      func get(index: Int64): T
      prop size: Int64
  }

enums: |
  enum Option<T> { | Some(T) | None }
  enum Result<T, E> { | Ok(T) | Err(E) }

constraints:
  interface_bound: "where T <: InterfaceName"
  class_bound: "where T <: ClassName  // only one class constraint per param"
  multiple: "where T <: Interface1 & Interface2 & Interface3"
  multi_param: "where K <: Hashable & Equatable<K>, V <: ToString"

variance:
  user_defined: "Invariant — Box<Sub> is NOT subtype of Box<Super>"
  tuples: "Covariant — (Sub1, Sub2) <: (Super1, Super2)"
  functions: "Contravariant in params, covariant in return"

instantiation:
  explicit: "Box<Int64>(42)"
  inferred: "Box(42)  // T inferred as Int64"
  partial: "Not supported — all type params must be resolved"
