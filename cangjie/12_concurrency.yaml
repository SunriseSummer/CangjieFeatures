thread_model:
  type: "M:N — lightweight user-level threads on native OS threads"
  note: "When main exits, all spawned threads are killed; use Future.get() to wait"

spawn:
  syntax: |
    let future = spawn { =>
        var sum = 0
        for (i in 1..=100) { sum += i }
        sum
    }
    println(future.get())  // blocks until done, prints 5050
  returns: "Future<T>"

Future:
  get: "get(): T — blocks until complete; re-throws on exception"
  get_timeout: "get(timeout: Duration): T — throws TimeoutException if expired"
  tryGet: "tryGet(): Option<T> — non-blocking"
  cancel: "cancel(): Unit — cooperative; thread checks hasPendingCancellation"
  thread: "prop thread: Thread"

Thread:
  current: "Thread.currentThread"
  id: "thread.id: Int64"
  hasPendingCancellation: "thread.hasPendingCancellation: Bool"
  sleep: "sleep(Duration.second * 2)"
  uncaught_handler: |
    thread.handleUncaughtExceptionBy { (t: Thread, e: Exception) =>
        println("Thread ${t.id} crashed: ${e}")
    }

synchronization:
  atomic:
    types: "AtomicInt8-64, AtomicUInt8-64, AtomicBool, AtomicReference<T>"
    ops: ["load()", "store(val)", "swap(val)", "compareAndSwap(old, new): Bool"]
    integer_only: ["fetchAdd(val)", "fetchSub(val)", "fetchAnd(val)", "fetchOr(val)", "fetchXor(val)"]
    note: "AtomicReference<T> requires reference type; compares identity, not equality"
    example: |
      import std.sync.*
      let counter = AtomicInt64(0)
      spawn { => counter.fetchAdd(1) }
      spawn { => counter.fetchAdd(1) }
      sleep(Duration.millisecond * 100)
      println(counter.load())  // 2

  Mutex:
    methods: ["lock()", "unlock()", "tryLock(): Bool"]
    example: |
      import std.sync.*
      let mtx = Mutex()
      mtx.lock()
      try { /* critical section */ } finally { mtx.unlock() }

  synchronized:
    syntax: "synchronized(lockObj) { /* critical section */ }"
    note: "Expression — returns block value; auto-releases on exit/break/return/throw"

  Condition:
    creation: "mtx.condition()  // mutex must be locked"
    methods:
      - "wait(): Unit"
      - "wait(timeout!: Duration): Bool"
      - "waitUntil(predicate: ()->Bool): Unit"
      - "waitUntil(predicate: ()->Bool, timeout!: Duration): Bool"
      - "notify(): Unit"
      - "notifyAll(): Unit"
    rules: "Must hold lock for wait/notify; always use wait in a while-loop"
    pattern: |
      import std.sync.*
      class Shared { public var ready = false }
      let data = Shared()
      let mtx = Mutex()
      mtx.lock()
      let cond = mtx.condition()
      mtx.unlock()
      let f1 = spawn { =>
          mtx.lock()
          while (!data.ready) { cond.wait() }
          mtx.unlock()
      }
      let f2 = spawn { =>
          mtx.lock()
          data.ready = true
          cond.notifyAll()
          mtx.unlock()
      }
      f1.get()
      f2.get()

  ThreadLocal:
    syntax: "let tls = ThreadLocal<Int64>()"
    usage: "tls.set(42); tls.set(None); tls.get(): Option<T>"

  SyncCounter:
    syntax: "let counter = SyncCounter(3)"
    methods: ["dec(): Unit", "waitUntilZero(): Unit"]
    example: |
      import std.sync.*
      let counter = SyncCounter(3)
      for (i in 0..3) {
          spawn { => counter.dec() }
      }
      counter.waitUntilZero()

cancellation: |
  Cooperative: future.cancel() → thread checks Thread.currentThread.hasPendingCancellation
  let f = spawn { =>
      while (!Thread.currentThread.hasPendingCancellation) { doWork() }
  }
  sleep(Duration.second)
  f.cancel()
