thread_model:
  type: "M:N (M language threads on N OS threads)"
  note: "Lightweight, cheap to create. When main exits, all spawned threads are killed immediately."

spawn:
  syntax: |
    let future = spawn {
        computeResult()
    }
  returns: "Future<T>"
  example: |
    let f: Future<Int64> = spawn { =>
        var sum = 0
        for (i in 1..=100) { sum += i }
        sum
    }
    println(f.get())  // 5050

future:
  methods:
    get: "Blocks until done; re-throws on exception"
    get_timeout: "get(timeout: Duration) — throws TimeoutException"
    tryGet: "Non-blocking → Option<T>"
    cancel: "Sends cancellation request (cooperative)"
  thread_prop: "future.thread → Thread object"

thread:
  static: "Thread.currentThread"
  instance: "thread.id: Int64 / thread.hasPendingCancellation: Bool"
  sleep: "sleep(Duration.second * 2)"
  uncaught_handler: |
    thread.handleUncaughtExceptionBy { (t: Thread, e: Exception) =>
        println("Thread ${t.id} crashed: ${e}")
    }

synchronization:
  atomic:
    types: "AtomicInt8-64, AtomicUInt8-64, AtomicBool, AtomicReference<T> (T must be reference type)"
    operations:
      basic: [load(), store(val), swap(val), "compareAndSwap(old, new): Bool"]
      integer_only: [fetchAdd(val), fetchSub(val), fetchAnd(val), fetchOr(val), fetchXor(val)]
    example: |
      import std.sync.*
      let counter = AtomicInt64(0)
      spawn { => counter.fetchAdd(1) }
      spawn { => counter.fetchAdd(1) }
      sleep(Duration.millisecond * 100)
      println(counter.load())  // 2

  mutex:
    methods: ["lock()", "unlock()", "tryLock(): Bool"]
    example: |
      import std.sync.*
      let mtx = Mutex()
      mtx.lock()
      try { /* critical section */ } finally { mtx.unlock() }

  synchronized:
    syntax: "synchronized(lockObject) { /* critical section */ }"
    note: "Expression — returns block value; auto-releases on exit"

  condition_variable:
    creation: "let cond = mtx.condition()  // mutex must be locked"
    methods:
      - "wait() / wait(timeout!: Duration): Bool"
      - "waitUntil(predicate: ()->Bool) / waitUntil(predicate, timeout!: Duration): Bool"
      - "notify() / notifyAll()"
    rules:
      - "Must hold lock when calling wait/notify"
      - "Always wait() inside while-loop (spurious wakeups)"
    pattern: |
      import std.sync.*
      class Shared { public var ready = false }
      let data = Shared()
      let mtx = Mutex()
      mtx.lock()
      let cond = mtx.condition()
      mtx.unlock()
      let f1 = spawn { =>
          mtx.lock()
          while (!data.ready) { cond.wait() }
          mtx.unlock()
      }
      let f2 = spawn { =>
          mtx.lock()
          data.ready = true
          cond.notifyAll()
          mtx.unlock()
      }
      f1.get()
      f2.get()

  thread_local:
    syntax: "let tls = ThreadLocal<Int64>()"
    usage: "tls.set(42) / tls.set(None) / tls.get(): Option<T>"

  sync_counter:
    syntax: "let counter = SyncCounter(3)"
    methods: ["dec()", "waitUntilZero()"]
    example: |
      import std.sync.*
      let counter = SyncCounter(3)
      for (i in 0..3) {
          spawn { => /* work... */ counter.dec() }
      }
      counter.waitUntilZero()

cancellation:
  mechanism: |
    1. Caller: future.cancel()
    2. Thread checks: Thread.currentThread.hasPendingCancellation
