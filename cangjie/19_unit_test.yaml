basics:
  setup: "Test file: src/xxx_test.cj; unittest auto-imported; run with cjpm test"
  function: |
    @Test
    func addTest() { @Expect(add(2, 3), 5) }
  class: |
    @Test
    class MathTests {
        @TestCase
        func addPositive() { @Expect(add(2, 3), 5) }
        @TestCase
        func addZero() { @Expect(add(0, 0), 0) }
    }
    // Class: @Test + parameterless constructor; methods: @TestCase

assertions:
  - "@Assert(a, b) / @Expect(a, b)"         # equality; Assert fast-fails, Expect continues
  - "@Assert(cond) / @Expect(cond)"          # boolean
  - "@AssertThrows[ExType](expr) / @ExpectThrows[ExType](expr)"
  - "@Fail(msg) / @FailExpect(msg)"          # unconditional
  - "@PowerAssert(expr)"                     # detailed diagram, fast-fail
  equatable: "@Assert(a, b) requires Equatable<B>; use @Derive[Equatable] for custom types"
  float: "@Expect(1.0, 1.001, delta: 0.001)"

lifecycle:
  hooks: ["@BeforeAll", "@BeforeEach", "@AfterEach", "@AfterAll"]
  order: "BeforeAll → (BeforeEach → TestCase → AfterEach)* → AfterAll"
  example: |
    @Test
    class DbTests {
        var conn = ""
        @BeforeAll
        func setupAll() { conn = "connected" }
        @AfterAll
        func teardownAll() { conn = "" }
        @TestCase
        func queryTest() { @Expect(conn, "connected") }
    }

parameterized:
  values: |
    @Test[x in [1, 2, 3]]
    func squareTest(x: Int64) { @Expect(x * x > 0) }
  range: "@Test[x in 0..10]"
  random: "@Test[x in random()]  // ~200 values, biased toward boundaries"
  multi: "@Test[x in [1, 2], y in [\"a\", \"b\"]]  // Cartesian product"
  types: "@Types[T in <Int64, Float64, String>]"

configuration:
  configure: "@Configure[randomSeed: 42, generationSteps: 1000]"
  tags: "@Tag[\"fast\"]  // CLI: --include-tags/--exclude-tags"
  skip: "@Skip"
  timeout: "@Timeout[Duration.second * 5]"
  parallel: "@Parallel"

mock:
  create: |
    let repo = mock<Repository>()
    let repo2 = mock<Repository>([ReturnsDefaults])
    let spyObj = spy<Service>(realService)
  stub: |
    @On(repo.getData(testId, _)).returns(testResponse)
    @On(repo.getData(_)).throws(TimeoutException())
    @On(repo.getData(_)).returnsConsecutively([v1, v2, v3])
    @On(foo.name).returns("test")
    @On(spyObj.method()).callsOriginal()
  matchers: ["any()/_", "eq(value)/literal", "same(ref)", "ofType<T>()", "argThat(pred)", "capture(listener)"]
  counts: |
    @On(foo.bar()).returns().once()
    @On(foo.bar()).returns().times(3)
    @On(foo.bar()).returns().atLeastOnce()
    @On(foo.bar()).returns().anyTimes()
  verify: |
    Verify.that(@Called(foo.bar()))
    Verify.that(@Called(foo.bar()).once())
    Verify.that(@Called(foo.bar()).never())
    Verify.noInteractions(mockObj)
    Verify.ordered(@Called(foo.step1()), @Called(foo.step2()))

dynamic_tests: |
  @TestBuilder
  func dynamicTests(): TestSuite {
      TestSuite.builder("DynTests")
          .add(UnitTestCase.create("case1") { @Expect(1, 1) })
          .build()
  }

test_template: |
  @TestTemplate
  abstract class BaseTests {
      @BeforeEach
      func setup() { /* common */ }
      @TestCase
      func commonTest() { /* shared */ }
  }
  @Test
  class MyTests <: BaseTests {
      @TestCase
      func specificTest() { /* additional */ }
  }

benchmark:
  basic: |
    @Test
    class MyBench {
        @Bench
        func sortBench() { ... }
        @Bench[size in [1000, 10000, 100000]]
        func paramBench(size: Int64) { ... }
    }
  run: "cjpm bench"
  measure: "@Measure[TimeNow(Nanos), CpuCycles()]"

cli:
  - "--filter=pattern"
  - "--timeout-each=10s"
  - "--parallel"
  - "--include-tags/--exclude-tags"
  - "--report-path/--report-format"
  - "--dry-run"
  - "--no-capture-output"
  - "--coverage-guided"
