basics:
  setup: "Test file: src/xxx_test.cj; run with: cjpm test"
  test_function: |
    @Test
    func addTest() {
        @Expect(add(2, 3), 5)
    }
  test_class: |
    @Test
    class MathTests {
        @TestCase
        func addPositive() { @Expect(add(2, 3), 5) }
        @TestCase
        func addZero() { @Expect(add(0, 0), 0) }
    }
  class_rules: "Class @Test + parameterless constructor; methods @TestCase"

assertions:
  macros:
    - "@Assert(a, b) / @Expect(a, b)      — equality (fast/soft fail)"
    - "@Assert(cond) / @Expect(cond)       — boolean (fast/soft fail)"
    - "@AssertThrows[E](expr) / @ExpectThrows[E](expr)"
    - "@Fail(msg) / @FailExpect(msg)"
    - "@PowerAssert(expr)                  — detailed diagram"
  equatable: "@Assert(a, b) requires Equatable; use @Derive[Equatable] for custom types"
  float: "@Expect(1.0, 1.001, delta: 0.001)"

lifecycle:
  hooks: ["@BeforeAll", "@BeforeEach", "@AfterEach", "@AfterAll"]
  order: "BeforeAll → (BeforeEach → TestCase → AfterEach)* → AfterAll"
  note: "Available only in test classes"

parameterized_tests:
  value: |
    @Test[x in [1, 2, 3]]
    func squareTest(x: Int64) { @Expect(x * x > 0) }
  range: |
    @Test[x in 0..10]
    func rangeTest(x: Int64) { @Expect(x >= 0) }
  random: "@Test[x in random()]  // ~200 values, biased toward boundaries"
  multi_param: |
    @Test[x in [1, 2], y in ["a", "b"]]
    func multiTest(x: Int64, y: String) { /* Cartesian product */ }
  type_param: |
    @Types[T in <Int64, Float64, String>]
    @Test
    func genericTest<T>() { ... }

configuration:
  configure: "@Configure[randomSeed: 42, generationSteps: 1000]"
  tags: '@Tag["fast"] — filter: --include-tags "fast" --exclude-tags "slow"'
  skip: "@Skip"
  timeout: "@Timeout[Duration.second * 5]"
  parallel: "@Parallel"

mock:
  create: |
    let repo = mock<Repository>()
    let repo2 = mock<Repository>([ReturnsDefaults])
    let spyObj = spy<Service>(realService)
  stub: |
    @On(repo.getData(testId, _)).returns(testResponse)
    @On(repo.getData(_)).throws(TimeoutException())
    @On(repo.getData(_)).returnsConsecutively([v1, v2, v3])
    @On(foo.name).returns("test")
    @On(spyObj.method()).callsOriginal()
  matchers: ["any() / _", "eq(value)", "same(ref)", "ofType<T>()", "argThat(predicate)", "capture(listener)"]
  counts: "once() / times(3) / atLeastOnce() / anyTimes()"
  verify: |
    Verify.that(@Called(foo.bar()).once())
    Verify.that(@Called(foo.bar()).never())
    Verify.noInteractions(mockObj)
    Verify.ordered(@Called(foo.step1()), @Called(foo.step2()))

dynamic_tests: |
  @TestBuilder
  func dynamicTests(): TestSuite {
      TestSuite.builder("DynTests")
          .add(UnitTestCase.create("case1") { @Expect(1, 1) })
          .build()
  }

test_template: |
  @TestTemplate
  abstract class BaseTests {
      @BeforeEach
      func setup() { /* common */ }
      @TestCase
      func commonTest() { /* shared */ }
  }
  @Test
  class MyTests <: BaseTests {
      @TestCase
      func specificTest() { /* additional */ }
  }

benchmark:
  basic: |
    @Test
    class MyBench {
        @Bench
        func sortBench() { let arr = Array<Int64>(10000, repeat: 0) }
        @Bench[size in [1000, 10000, 100000]]
        func paramBench(size: Int64) { /* ... */ }
    }
  run: "cjpm bench"
  measurement: "@Measure[TimeNow(Nanos), CpuCycles()]"

cli_options:
  - "--filter=pattern"
  - "--timeout-each=10s"
  - "--parallel"
  - "--include-tags / --exclude-tags"
  - "--report-path / --report-format"
  - "--dry-run"
  - "--no-capture-output"
  - "--bench"
  - "--coverage-guided"
