commands:
  init: "cjpm init"
  init_lib: "cjpm init --type=static"
  init_workspace: "cjpm init --workspace"
  build: "cjpm build"
  run: "cjpm run"
  test: "cjpm test"
  bench: "cjpm bench"
  clean: "cjpm clean"
  install: "cjpm install"
  tree: "cjpm tree"

project_structure: |
  myapp/
  ├── cjpm.toml
  ├── src/
  │   ├── main.cj
  │   ├── lib_test.cj      # _test.cj suffix
  │   └── utils/
  │       └── helper.cj
  └── target/               # build output

minimal_main: |
  // src/main.cj
  package myapp
  main(): Int64 {
      println("Hello, Cangjie!")
      return 0
  }

cjpm_toml:
  single_module: |
    [package]
      cjc-version = "1.0.5"
      name = "myapp"
      version = "1.0.0"
      output-type = "executable"    # "executable" | "static" | "dynamic"
  package_fields: [cjc-version, name, version, output-type, compile-option, link-option, src-dir, target-dir]

  workspace: |
    [workspace]
      members = ["app", "libs/core", "libs/util"]
  workspace_fields: [members, build-members, test-members, compile-option, link-option]
  note: "[package] and [workspace] are mutually exclusive"

build_options:
  - "-i, --incremental"
  - "-j, --jobs <N>"
  - "-g (debug build)"
  - "-V, --verbose"
  - "--coverage"
  - "--cfg <value>"
  - "-m, --member <value>"
  - "--target <value>"
  - "-o, --output <value>"
  - "-l, --lint"
  - "--mock"

run_options:
  flags:
    - "--name <value>"
    - "--build-args <value>"
    - "--run-args <value>"
    - "--skip-build"
    - "-g (debug)"
  example: 'cjpm run --build-args="-s -j16" --run-args="a b c"'

test_options:
  - "--filter <value>"
  - "--timeout-each <value>"
  - "--parallel <value>"
  - "--random-seed <value>"
  - "--no-color"
  - "--report-path / --report-format"
  - "--coverage"

dependencies:
  source: |
    [dependencies]
      core = { path = "./libs/core" }
      logger = { git = "https://example.com/logger.git", branch = "main" }
      utils = { git = "https://example.com/utils.git", tag = "v1.0.0" }
  test: |
    [test-dependencies]
      mock_lib = { path = "./test_libs/mock" }
  replace: |
    [replace]
      logger = { path = "./local_logger" }

profile_config:
  build: |
    [profile.build]
      compile-option = "-O2"
      lto = "full"
  test: |
    [profile.test]
      compile-option = "-g"
      mock = "on"
  test_env: |
    [profile.test.env]
      MY_ENV = { value = "abc" }
      PATH = { value = "/usr/local/bin", splice-type = "prepend" }
  env_splice_types: [absent, replace, prepend, append]

ffi_config: |
  [ffi.c]
    myc.path = "./c_libs"

cross_compilation: |
  [target.x86_64-unknown-linux-gnu]
    compile-option = "-O2"
    link-option = "-L/usr/lib"
  # cjpm build --target x86_64-w64-mingw32

build_script: "Place build.cj in project root; --skip-script to bypass"

key_rules:
  - "Test files: _test.cj suffix, @Test annotation"
  - "Test imports: std.unittest.* auto-imported in test mode"
  - "Default output: main in target/release/bin/"
  - "Lock file: cjpm.lock auto-generated; cjpm update to refresh"
  - "Priority: command-line > config file"
