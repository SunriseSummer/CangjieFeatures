commands:
  init: "cjpm init"                           # executable project
  init_lib: "cjpm init --type=static"         # static library
  init_workspace: "cjpm init --workspace"
  build: "cjpm build"
  run: "cjpm run"
  test: "cjpm test"
  bench: "cjpm bench"
  clean: "cjpm clean"
  install: "cjpm install"
  tree: "cjpm tree"                           # dependency tree

project_layout: |
  myapp/
  ├── cjpm.toml
  ├── src/
  │   ├── main.cj           # entry point
  │   ├── lib_test.cj       # test file (_test.cj suffix)
  │   └── utils/
  │       └── helper.cj     # sub-package
  └── target/               # build output

cjpm_toml:
  single_module: |
    [package]
    cjc-version = "1.0.5"
    name = "myapp"
    version = "1.0.0"
    output-type = "executable"   # "executable" | "static" | "dynamic"
  package_fields: [cjc-version, name, version, output-type, compile-option, link-option, src-dir, target-dir]
  workspace: |
    [workspace]
    members = ["app", "libs/core", "libs/util"]
  workspace_fields: [members, build-members, test-members, compile-option, link-option]
  note: "[package] and [workspace] are mutually exclusive"

build_flags:
  - "-i, --incremental"
  - "-j, --jobs <N>"
  - "-g"                         # debug build
  - "-V, --verbose"
  - "--coverage"
  - "--cfg <value>"              # conditional compilation
  - "-m, --member <value>"       # workspace member
  - "--target <value>"           # cross-compilation
  - "-o, --output <value>"
  - "-l, --lint"
  - "--mock"

run_flags:
  flags:
    - "--name <value>"
    - "--build-args <value>"
    - "--run-args <value>"
    - "--skip-build"
    - "-g"
  example: 'cjpm run --build-args="-s -j16" --run-args="a b c"'

test_flags:
  - "--filter <value>"           # wildcard pattern
  - "--timeout-each <value>"     # %d[millis|s|m|h]
  - "--parallel <value>"         # true/false/nCores/<N>
  - "--random-seed <value>"
  - "--no-color"
  - "--report-path/--report-format"
  - "--coverage"

dependencies:
  path: '{ path = "./libs/core" }'
  git_branch: '{ git = "https://example.com/logger.git", branch = "main" }'
  git_tag: '{ git = "https://example.com/utils.git", tag = "v1.0.0" }'
  test: '[test-dependencies]'
  replace: '[replace]'

profiles:
  build: |
    [profile.build]
    compile-option = "-O2"
    lto = "full"              # "thin" | "full"
  test: |
    [profile.test]
    compile-option = "-g"
    mock = "on"               # "on" | "off" | "runtime-error"
  test_env: |
    [profile.test.env]
    MY_ENV = { value = "abc" }
    PATH = { value = "/usr/local/bin", splice-type = "prepend" }
  splice_types: [absent, replace, prepend, append]

ffi_config: |
  [ffi.c]
  myc.path = "./c_libs"

cross_compilation: |
  [target.x86_64-unknown-linux-gnu]
  compile-option = "-O2"
  # cjpm build --target x86_64-w64-mingw32

build_script: "Place build.cj in project root; skip with --skip-script"

key_rules:
  - "Test files: _test.cj suffix, @Test annotation"
  - "Test imports: std.unittest.* auto-imported in test mode"
  - "Default output: target/release/bin/main"
  - "Lock file: cjpm.lock auto-generated; cjpm update to refresh"
  - "Priority: command-line options > config file"
