variables:
  let:
    syntax: "let name: Type = value"
    inference: "let name = value"
    note: "Cannot be reassigned after initialization"
  var:
    syntax: "var name: Type = value"
    note: "Can be reassigned; struct fields must be var for mutability"
  const:
    syntax: "const NAME: Type = constexpr"
    allowed_types: "Int, UInt, Float, Bool, Rune, String"
    note: "Evaluated at compile time"
  destructuring:
    tuple: "let (x, y) = (1, 2)"
    wildcard: "let (_, y) = (1, 2)"
  scope: "Block-scoped with lexical scoping; inner block can shadow outer variable"

expressions:
  values: |
    if/match/try are expressions that return values:
      let x = if (cond) { 1 } else { 2 }
      let y = match (v) { case 1 => "one"; case _ => "other" }
      let z = try { riskyOp() } catch (_: Exception) { fallback }

  code_block_rule: |
    Standalone { exprs } are NOT valid expressions.
    Blocks only attach to if/while/for-in/match/func/lambda.
    INVALID: let r = { let x = 2; x ** 3 }

  if:
    syntax: |
      if (condition) {
          thenBranch
      } else if (condition2) {
          branch2
      } else {
          elseBranch
      }
    if_let: |
      if (let Some(v) <- optionalExpr) {
          // v is bound here
      }

  while:
    basic: "while (condition) { body }"
    do_while: "do { body } while (condition)"
    while_let: |
      while (let Some(v) <- iter.next()) {
          // v is bound each iteration
      }

  for_in:
    basic: "for (item in iterable) { body }"
    with_where: |
      for (x in 0..10 where x % 2 == 0) {
          println(x)  // 0, 2, 4, 6, 8
      }
    destructuring: |
      for ((key, value) in pairs) {
          println("${key}: ${value}")
      }
    range: |
      for (i in 0..5) { }    // 0,1,2,3,4
      for (i in 0..=5) { }   // 0,1,2,3,4,5

  match:
    with_value: |
      match (expr) {
          case pattern1 => result1
          case pattern2 where guard => result2
          case _ => default
      }
    without_value: |
      match {
          case boolExpr1 => result1
          case _ => default
      }
    combined: "case 1 | 2 | 3 => \"small\""
    exhaustiveness: "Must cover all cases; use _ for catch-all"

  loop_control:
    break: "exits innermost loop"
    continue: "skips to next iteration"
    type: Nothing

  range:
    half_open: "1..4"   # 1, 2, 3
    closed: "1..=4"     # 1, 2, 3, 4
    step: "1..6:2"      # 1, 3, 5
    type: "Range<T> where T <: Countable<T>"

  assignment:
    simple: "x = value"
    compound: "x += 1; x -= 1; x *= 2; x /= 2; x %= 3"
    type: Unit

  string_interpolation:
    syntax: '"text ${expression} more text"'
