annotations:
  overflow_control:
    types:
      OverflowThrowing: "Throw OverflowException (DEFAULT)"
      OverflowWrapping: "Wrap around (modular arithmetic)"
      OverflowSaturating: "Clamp to min/max of type"
    affected: ["+", "-", "*", "/", "**", "++", "--", "<<"]
    unaffected: ["%", "&", "|", "^", ">>", "comparison"]
    example: |
      @OverflowWrapping
      func wrappingAdd(a: Int8, b: Int8): Int8 { a + b }
      @OverflowSaturating
      func saturatingAdd(a: Int8, b: Int8): Int8 { a + b }

  custom:
    syntax: |
      @Annotation[target: [AnnotationKind.Type]]
      public class MyAnnotation { ... }
    kinds: [Type, Parameter, Init, MemberProperty, MemberFunction, MemberVariable, EnumConstructor, GlobalFunction, GlobalVariable, Extension]
    example: |
      @Annotation[target: [MemberFunction, GlobalFunction]]
      public class Deprecated {
          let message: String
          public init(message: String) { this.message = message }
      }

reflection:
  obtaining:
    from_instance: "ClassTypeInfo.of(objectInstance)"
    from_generic: "TypeInfo.of<T>()"
    from_name: 'TypeInfo.get("module.package.Type")'
    note: "TypeInfo.of(instance) is deprecated — use ClassTypeInfo.of"

  ClassTypeInfo:
    capabilities: ["getStaticVariable(name)", "getInstanceVariable(name)", "getInstanceProperty(name)", "getInstanceFunction(name)", "Constructor access"]

  VariableInfo:
    get: "getValue() / getValue(obj: Object) → Option<Any>"
    set: "setValue(value: Any) / setValue(obj: Object, value: Any)"

  limitations:
    - "Only public members accessible"
    - "Cannot reflect uninstantiated generic types"
    - "Lower performance than direct access"
