annotations:
  overflow_control:
    OverflowThrowing: "Throw OverflowException (DEFAULT)"
    OverflowWrapping: "Wrap around (modular arithmetic)"
    OverflowSaturating: "Clamp to min/max value"
    affected_ops: ["+", "-", "*", "/", "**", "++", "--", "<<"]
    example: |
      @OverflowWrapping
      func wrappingAdd(a: Int8, b: Int8): Int8 { a + b }
      @OverflowSaturating
      func saturatingAdd(a: Int8, b: Int8): Int8 { a + b }

  custom_annotations:
    syntax: |
      @Annotation[target: [AnnotationKind.Type]]
      public class MyAnnotation { /* fields */ }
    targets: [Type, Parameter, Init, MemberProperty, MemberFunction, MemberVariable, EnumConstructor, GlobalFunction, GlobalVariable, Extension]
    example: |
      @Annotation[target: [MemberFunction, GlobalFunction]]
      public class Deprecated {
          let message: String
          public init(message: String) { this.message = message }
      }

reflection:
  type_info:
    from_instance: "ClassTypeInfo.of(objectInstance)"
    from_generic: "TypeInfo.of<T>()"
    from_name: 'TypeInfo.get("module.package.Type")'
    throws: InfoNotFoundException

  class_type_info:
    capabilities:
      - getStaticVariable(name)
      - getInstanceVariable(name)
      - getInstanceProperty(name)
      - getInstanceFunction(name)
      - "Constructor access"

  variable_info:
    get: "info.getValue() / info.getValue(obj)"
    set: "info.setValue(value) / info.setValue(obj, value)"

  limitations:
    - "Only public members accessible"
    - "Cannot reflect uninstantiated generic types"
