language:
  name: Cangjie
  version: "full-core-0.3"
  spec_version: "2.0-draft"
  summary: Comprehensive Cangjie language specification excluding macros, for LLM learning.
  design_goals:
    - cover all stable language features except macro/metaprogramming
    - keep rules explicit enough for validation and prompt loading
    - prefer canonical syntax over exhaustive edge-case coverage

scope:
  included:
    - package, import, re-export (public import), and access modifiers (private/internal/protected/public)
    - main entry point
    - variable declarations (let, var, const) and const expressions/functions/init
    - functions, lambda, closures, named parameters, default values, varargs (Array<T> last param)
    - operator overloading, pipe operator (|>), composition operator (~>)
    - trailing lambda syntax
    - if/else, while/do-while, for-in, match expressions (all are expressions)
    - break/continue (type Nothing, unreachable code after)
    - class (open, abstract, sealed), struct, interface, enum
    - constructors (init, primary constructor), static init, finalizer (~init)
    - properties (prop, mut prop) with get/set accessors
    - generic parameters, where constraints, variance (invariant for user types)
    - type system (is/as, subtyping, type aliases, no implicit conversion)
    - extension declarations (direct and interface extensions, orphan rule)
    - Option type (?T, ??, ?., if-let, while-let, getOrThrow)
    - error handling (throw, try/catch/finally, try-with-resources, Exception hierarchy)
    - concurrency (spawn, Future, Mutex, Condition, synchronized, integer/reference atomics, ThreadLocal, SyncCounter, Timer, Barrier, Semaphore, ReadWriteLock, sleep(Duration))
    - annotations (@Annotation, @OverflowThrowing/Wrapping/Saturating) and reflection (TypeInfo)
    - C interop (foreign, unsafe, CPointer, CFunc, CString, @C struct, VArray, inout, @CallingConv)
    - collections (Array, ArrayList, HashMap, HashSet, Collection, Countable, Ordering)
    - string operations (UTF-8, for-in iterates bytes, runes() for characters, interpolation, StringBuilder)
  omitted:
    - macro system (quote, Tokens, attribute macros)

modules:
  - id: core
    summary: All stable language features except macros.
    includes: []

