    - cffi
  diagnostics:
    - package_must_be_first
    - package_path_mismatch
    - import_before_declarations
    - duplicate_top_level_symbol
    - local_variable_uninitialized
    - if_condition_not_bool
    - while_condition_not_bool
    - for_in_requires_iterable
    - match_not_exhaustive
    - struct_recursive_field
    - interface_member_not_implemented
    - generic_constraint_invalid
    - type_alias_cycle
    - rune_no_arithmetic
    - let_struct_cannot_call_mut
    - extend_cannot_add_stored_field
    - throw_requires_exception_subtype
    - uncaught_exception
    - unsafe_context_required
    - foreign_param_not_ctype
    - annotation_target_mismatch

