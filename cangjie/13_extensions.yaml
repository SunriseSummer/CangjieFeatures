direct_extension:
  syntax: |
    extend TargetType {
        public func newMethod(): ReturnType { ... }
        public prop newProperty: Type { get() { ... } }
        public operator func +(rhs: TargetType): TargetType { ... }
    }
  example: |
    extend String {
        public func isPalindrome(): Bool {
            let runes = ArrayList<Rune>()
            for (r in this.runes()) { runes.add(r) }
            var i = 0
            var j = runes.size - 1
            while (i < j) {
                if (runes[i] != runes[j]) { return false }
                i += 1; j -= 1
            }
            return true
        }
    }
  generic: |
    extend<T> Array<T> where T <: ToString {
        public func joinToString(separator: String): String {
            var result = ""
            for (i in 0..this.size) {
                if (i > 0) { result += separator }
                result += this[i].toString()
            }
            result
        }
    }
  non_extensible: "Function types, tuple types, and interface types cannot be extended"

interface_extension:
  syntax: |
    extend TargetType <: InterfaceName {
        public func requiredMethod(): ReturnType { ... }
    }
  multiple: "extend TargetType <: Interface1 & Interface2 { ... }"
  example: |
    extend Int64 <: Printable {
        public func display(): String { "${this}" }
    }

rules:
  can_add: "Functions, properties (prop/mut prop), operators, interface implementations"
  cannot_add: "Member variables (no new fields)"
  modifiers_not_allowed: "open, override, redef"
  access:
    - "this works normally; super is NOT available"
    - "Cannot access private members or shadow existing members"
  visibility: |
    Extension members visible within defining package.
    Auto-exported if type and constraints are exported.

orphan_rule: "Cannot implement foreign interface on foreign type — at least one must be local"
