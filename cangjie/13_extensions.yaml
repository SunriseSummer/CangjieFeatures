direct:
  syntax: |
    extend TargetType {
        public func newMethod(): ReturnType { ... }
        public prop newProperty: Type { get() { ... } }
        public operator func +(rhs: TargetType): TargetType { ... }
    }
  example: |
    import std.collection.*
    extend String {
        public func isPalindrome(): Bool {
            let list = ArrayList<Rune>()
            for (r in this.runes()) { list.add(r) }
            let chars = list.toArray()
            var i = 0
            var j = chars.size - 1
            while (i < j) {
                if (chars[i] != chars[j]) { return false }
                i += 1; j -= 1
            }
            return true
        }
    }
    // "racecar".isPalindrome() → true
  generic: |
    extend<T> Array<T> where T <: ToString {
        public func joinToString(separator: String): String { ... }
    }
    // Or fully instantiated: extend Array<Int64> { ... }
  non_extensible: "Function types, tuple types, interface types cannot be extended"

interface_extension:
  syntax: |
    extend TargetType <: InterfaceName {
        public func requiredMethod(): ReturnType { ... }
    }
  multiple: "extend TargetType <: Interface1 & Interface2 { ... }"
  example: |
    extend Int64 <: Printable {
        public func display(): String { "${this}" }
    }

rules:
  can_add: ["Functions", "Properties", "Operator functions", "Interface implementations"]
  cannot_add: "Member variables (no new fields)"
  no_modifiers: [open, override, redef]
  access:
    - "this works normally; super NOT available"
    - "Cannot access private members or shadow existing members"
  visibility: "Auto-exported if type and constraints are exported; imported with the type"

orphan_rule: |
  Cannot implement foreign interface on foreign type.
  At least one of (type, interface) must be in current package/module.
