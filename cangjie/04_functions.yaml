declaration:
  syntax: |
    func name(param1: Type1, param2: Type2): ReturnType {
        body
    }
  implicit_return: "Last expression is return value if no explicit return"
  unit_return: "`: Unit` optional for void-like functions"

  named_parameters:
    syntax: "func f(name!: Type = defaultValue)"
    calling: "f(name: value)"
    ordering: "Non-named params must precede named params"
    example: |
      func connect(host: String, port!: Int64 = 8080): Unit {
          println("${host}:${port}")
      }
      connect("localhost", port: 9090)
      connect("localhost")  // port defaults to 8080

  return_type_inference: "func double(x: Int64) { x * 2 }"

  overloading: "Same name, different parameter types or counts"

  variadic_parameters: "Only in foreign (C FFI) functions"

  generic: |
    func identity<T>(x: T): T { x }
    func printAll<T>(items: Array<T>): Unit where T <: ToString {
        for (item in items) { println(item.toString()) }
    }

lambda:
  syntax:
    typed: "{ x: Int64, y: Int64 => x + y }"
    inferred: "{ x => x * 2 }"
    no_param: "{ => println(\"hello\") }"
    note: "Braces required; params before =>"

  trailing_lambda:
    rule: "When last param is a function, lambda can follow the call"
    single_param: "doWork { => println(\"working\") }"
    arrow_omit: "doWork { println(\"working\") }"
    example: |
      func repeat(n: Int64, action: (Int64) -> Unit): Unit {
          for (i in 0..n) { action(i) }
      }
      repeat(3) { i => println(i) }

  closures:
    capture_rules:
      - "let variables: captured freely"
      - "var variables: lambda CANNOT escape — must be called directly"
      - "Cannot assign to variable, return, or pass as argument"
    transitive: "If f calls g that captures a var, f also cannot escape"
    example: |
      let base = 100
      let addBase = { x: Int64 => x + base }   // OK: captures let
      var count = 0
      { => count += 1 }()                       // OK: called directly

  function_types:
    syntax: "(ParamTypes) -> ReturnType"
    examples: ["(Int64, Int64) -> Int64", "() -> Unit", "(String) -> Bool"]

pipeline_and_composition:
  pipeline: "x |> f ≡ f(x)"
  composition: "f ~> g ≡ { x => g(f(x)) }"
  example: |
    let result = data |> parse |> validate |> transform
    let process = parse ~> validate ~> transform

operator_overloading:
  binary: "operator func +(rhs: MyType): MyType { ... }"
  equality: "operator func ==(rhs: MyType): Bool { ... }"
  subscript_get: "operator func [](index: Int64): T { ... }"
  subscript_set: "operator func [](index: Int64, value!: T): Unit { ... }"
  call: "operator func ()(args: Type): ReturnType { ... }"
  example: |
    struct Vec2 {
        let x: Float64
        let y: Float64
        public init(x: Float64, y: Float64) {
            this.x = x; this.y = y
        }
        public operator func +(rhs: Vec2): Vec2 {
            Vec2(x + rhs.x, y + rhs.y)
        }
    }

const_functions:
  syntax: "const func square(x: Int64): Int64 { x * x }"
  usage: "const SIZE = square(10)  // evaluated at compile time: 100"
  restriction: "Const expressions only; no side effects, no I/O"

nested_functions: |
  func outer(): Int64 {
      func inner(x: Int64): Int64 { x * 2 }
      return inner(21)
  }
