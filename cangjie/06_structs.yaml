definition:
  note: "Value type — assignment copies; passed by value; no reference sharing"
  example: |
    struct Point {
        let x: Float64
        let y: Float64
        public init(x: Float64, y: Float64) {
            this.x = x; this.y = y
        }
        public func distanceTo(other: Point): Float64 {
            let dx = x - other.x
            let dy = y - other.y
            (dx * dx + dy * dy)
        }
    }

constructors:
  regular: "init(params) { // must initialize all fields without defaults }"
  primary: |
    struct Pair {
        public Pair(let first: Int64, let second: Int64) {}
    }
    // Name matches struct name; let/var params become fields
  auto_generated: "Parameterless init() when all fields have defaults and no explicit constructor"
  static_init: "static init() { // initialize static members }"

mutability:
  binding:
    let: "let p = Point(1.0, 2.0)   // cannot modify any field"
    var: "var p = Point(1.0, 2.0)   // can modify var fields"
  mut_func:
    syntax: |
      mut func moveTo(newX: Float64, newY: Float64): Unit {
          // can modify this struct's var fields
      }
    rules:
      - "Only callable on var-bound instances"
      - "Cannot be static"
      - "this cannot be captured by lambda or returned"
      - "Instance members cannot be captured by lambda inside mut func"
      - "Non-mut functions cannot call mut functions"
    example: |
      struct Counter {
          var count: Int64 = 0
          public mut func increment(): Unit { count += 1 }
      }
      var c = Counter()
      c.increment()
      println(c.count)  // 1
  value_semantics: |
    var a = MutPoint()
    a.x = 1.0
    var b = a       // b is a copy
    b.x = 10.0     // only b is modified
    println(a.x)   // still 1.0

restrictions:
  - "No inheritance; can implement interfaces"
  - "No recursive definitions (field cannot be same struct type)"
  - "No destructor (~init), no open/abstract/sealed/override/redef"

properties:
  immutable: "prop name: Type { get() { expression } }"
  mutable: |
    mut prop name: Type {
        get() { expression }
        set(v) { /* assign */ }
    }
  note: "mut prop setters behave like mut functions — only callable on var-bound instances"

interface_implementation:
  mut_matching: "Struct must exactly match mut modifier; class ignores it"
  boxing: |
    Assigning struct to interface-typed variable copies the struct.
    Calling mut func via interface modifies the copy, NOT the original.
