constructs:

  # ========== MODULE ==========

  - id: package_unit
    kind: declaration
    category: module
    summary: Declare a package and import visible symbols before other declarations.
    syntax:
      canonical: |
        package default.network.http
        import std.collection.*
      variants:
        - "import pkg.{A, B}"
        - "import pkg.name as alias"
        - "public import sub.f"
        - "import {pkg1.*, pkg2.*}"
      slots:
        - name: package_name
          ref: package_path
        - name: imports
          ref: import_path
    semantic_rules:
      - id: package_decl_is_first_non_comment_line
        op: declaration_order
        diagnostic: package_must_be_first
      - id: package_path_matches_source_layout
        op: package_matches_path
        diagnostic: package_path_mismatch
      - id: imports_precede_other_declarations
        op: import_section_before_declarations
        diagnostic: import_before_declarations
      - id: no_circular_package_imports
        op: acyclic_imports
      - id: local_names_shadow_imports
        op: local_over_imported
        note: Local declaration shadows imported name, except for function overloading.
      - id: access_modifiers_on_top_level
        op: access_modifier_levels
        levels: [private_file, internal_default, protected_module, public_global]
      - id: subpackage_no_same_name_as_top_level_decl
        op: name_disjoint_with_subpackage
    prerequisites: [package_path, import_path, access_modifier]

  - id: main_entry
    kind: declaration
    category: module
    summary: The program entry point. Defined without func keyword. At most one per root package.
    syntax:
      canonical: |
        main(): Int64 {
            return 0
        }
      variants:
        - |
          main(args: Array<String>): Unit {
              for (arg in args) { println(arg) }
          }
    semantic_rules:
      - id: main_no_func_keyword
        op: keyword_absent
        keyword: func
      - id: main_no_access_modifier
        op: disallow_access_modifier
      - id: main_param_type_restricted
        op: param_type_one_of
        allowed: [none, "Array<String>"]
      - id: main_return_type_restricted
        op: return_type_one_of
        allowed: [Unit, Int64, Int32, Int16, Int8, UInt8, UInt16, UInt32, UInt64]
      - id: at_most_one_main_per_root_package
        op: unique_in_scope
        scope: root_package

  # ========== BINDINGS ==========

  - id: variable_decl
    kind: declaration
    category: syntax
    summary: Declare immutable (let), mutable (var), or compile-time constant (const) bindings with optional type annotation.
    syntax:
      canonical: "let x: Int64 = 1"
      variants:
        - "var count = 0"
        - "const PI = 3.14"
        - "let (a, b) = (1, 2)"
    semantic_rules:
      - id: const_requires_initializer
        op: initializer_required_for_modifier
        target: const
        diagnostic: local_variable_uninitialized
      - id: global_and_static_must_initialize
        op: initializer_required_in_scope
        target: [global_variable, static_variable]
      - id: type_annotation_or_initializer_required
        op: type_or_initializer_required
      - id: let_value_type_prevents_all_mutation
        op: let_value_semantics
        note: "let on a value type (struct, primitive) prevents any mutation including mut method calls."
      - id: let_reference_type_prevents_reassignment_only
        op: let_reference_semantics
        note: "let on a reference type (class) prevents reassignment but allows mutating members."
      - id: tuple_destructuring_in_let
        op: irrefutable_pattern_binding
        note: "let (a, b) = expr destructures tuples. Pattern must be irrefutable."
    prerequisites: [identifier, type_expr, expression, pattern]

  - id: const_decl
    kind: declaration
    category: syntax
    summary: Compile-time constant expressions, const functions, and const init for struct/class.
    syntax:
      canonical: "const G = 6.674e-11"
      variants:
        - |
          const func distance(a: Float64, b: Float64): Float64 {
              let dx = a - b
              if (dx >= 0.0) { dx } else { -dx }
          }
        - |
          struct Point {
              const Point(let x: Float64, let y: Float64) {}
          }
    semantic_rules:
      - id: const_func_body_all_const_exprs
        op: all_expressions_are_const
        note: "Const exprs: literals, const vars, const func calls, arithmetic/relational/bitwise on const operands, if/match/is/as with const internals, member access (no props), tuple index, this/super in const init."
      - id: const_array_literal_is_varray
        op: const_array_literal_type
        note: "An all-const array literal is permitted in const context only as a VArray-style constant value, not as runtime Array<T>."
      - id: const_func_no_var_locals
        op: disallow_var_in_const_func
        note: Only let and const locals inside const func body.
      - id: const_init_only_assignment_to_fields
        op: const_init_restricted_side_effects
        note: "const init body: only simple field assignments (=). Class const init requires parent const init call. No var members in const-init class."
      - id: const_not_in_extend
        op: disallow_const_in_extend
      - id: const_func_can_be_runtime
        op: dual_evaluation
        note: "const func is compile-time if called in const context, runtime otherwise."
      - id: const_func_in_interface
        op: const_func_interface_constraint
        note: "const func can be declared in interfaces. Implementing types must also use const func."

  # ========== FUNCTIONS ==========

  - id: function_decl
    kind: declaration
    category: syntax
    summary: Define a function with positional params, named params (p!), optional return type, expression-based body, and varargs support.
    syntax:
      canonical: |
        func add(a: Int64, b: Int64): Int64 {
            return a + b
        }
      variants:
        - |
          func format(value: Int64, indent!: Int64 = 2): String {
              " " * indent + value.toString()
          }
        - |
          func printAll(items: Array<String>): Unit {
              for (s in items) { println(s) }
          }
          printAll("a", "b", "c")
    semantic_rules:
      - id: unnamed_before_named_params
        op: positional_before_named_parameters
      - id: named_params_use_bang_in_definition
        op: named_param_syntax
        note: "Definition uses p!: T or p!: T = default. Call site uses p: value (no bang). Named params order-flexible at call."
      - id: body_last_expr_is_implicit_return
        op: body_value_is_last_expression
        note: Last expression in body is the return value. Explicit return also valid.
      - id: return_type_consistency
        op: return_type_matches
        when: return_type_present
      - id: all_parameters_immutable
        op: params_are_let
      - id: varargs_last_non_named_array_param
        op: varargs_desugar
        note: "If last non-named param is Array<T>, caller can pass 0+ T values directly (desugared to array literal). Cannot combine with |> or ~>."
      - id: function_overloading
        op: overload_resolution
        note: "Same name, different param count/types. Most concrete match wins. Same-name static + instance disallowed."
      - id: pipe_operator
        op: pipe_desugar
        note: "e1 |> e2 = let v = e1; e2(v). e2 must accept exactly one arg (no non-default named params)."
      - id: compose_operator
        op: compose_desugar
        note: "f ~> g = { x => g(f(x)) }. Both single-param functions. f return subtype of g param."
    prerequisites: [identifier, param_list, type_expr, block_exprs, generic_parameters]

  - id: lambda_expr
    kind: expression
    category: syntax
    summary: Anonymous function expression using => separator. Return type always inferred.
    syntax:
      canonical: |
        { a: Int64, b: Int64 =>
            a + b
        }
      variants:
        - "{ => 42 }"
        - "apply { i => i * i }"
        - "{ i => i * 2 }(5)"
    semantic_rules:
      - id: lambda_return_type_inferred
        op: return_type_must_be_inferred
        note: No explicit return type annotation. Return type inferred from body last expression.
      - id: param_types_context_inferred
        op: param_types_optional
        note: "Parameter types can be omitted when context provides the expected function type."
      - id: captured_var_closure_cannot_escape
        op: escaping_closure_restricted
        note: "Closure capturing a var local cannot be assigned to a variable, returned, or passed as argument. Static/global vars are not captured."
      - id: transitive_var_capture
        op: transitive_capture_restriction
        note: "If function f calls function g that captures an external var (not f's local), f is also treated as capturing that var and cannot escape."
      - id: trailing_lambda_sugar
        op: trailing_lambda
        note: "When last function param is a function type: move lambda outside parens. If only param, parens optional. => optional in trailing position."
      - id: lambda_immediate_call
        op: iife_allowed
        note: "{ args => body }(values) is valid immediate invocation."
    prerequisites: [param_list, block_exprs]

  - id: operator_overload
    kind: declaration
    category: syntax
    summary: Overload operators inside class, struct, enum, interface, or extend.
    syntax:
      canonical: |
        struct Vec2 {
            var x: Float64 = 0.0
            var y: Float64 = 0.0
            public init(x: Float64, y: Float64) {
                this.x = x
                this.y = y
            }
            public operator func +(r: Vec2): Vec2 {
                Vec2(x + r.x, y + r.y)
            }
        }
      variants:
        - "public operator func -(): Vec2 { Vec2(-x, -y) }"
        - "public operator func [](i: Int64): Int64 { data[i] }"
        - "public operator func [](i: Int64, value!: Int64): Unit { data[i] = value }"
        - "public operator func ()(a: Int64): Int64 { a * 2 }"
    semantic_rules:
      - id: unary_op_no_params
        op: param_count_is
        count: 0
        when: unary_operator
        note: "Unary prefix: operator func -(): T. Unary postfix (++/--) not overloadable."
      - id: binary_op_one_param
        op: param_count_is
        count: 1
        when: binary_operator
      - id: cannot_be_static_or_generic
        op: disallow_modifiers
        modifiers: [static, generic]
      - id: overloadable_operators_only
        op: operator_in_set
        allowed: ["()", "[]", "!", "-", "**", "*", "/", "%", "+", "-", "<<", ">>", "<", "<=", ">", ">=", "==", "!=", "&", "^", "|"]
      - id: compound_assignment_auto_enabled
        op: auto_compound_assign
        note: "If binary operator (e.g. +) returns compatible type, compound assign (+=) is automatically available."
      - id: index_set_uses_named_value_param
        op: index_set_syntax
        note: "[] set form: operator func [](i: Int64, value!: T): Unit. Setter called as obj[i] = value."
      - id: preserves_precedence
        op: precedence_unchanged
        note: Overloaded operator keeps the same precedence as the built-in operator.

  - id: property_decl
    kind: declaration
    category: syntax
    summary: Computed properties via prop (read-only) and mut prop (read-write) with get/set accessors.
    syntax:
      canonical: |
        prop name: String {
            get() { _name }
        }
      variants:
        - |
          mut prop count: Int64 {
              get() { _count }
              set(v) { _count = v }
          }
        - "static prop instance: Singleton { get() { _inst } }"
    semantic_rules:
      - id: mut_prop_requires_both_get_set
        op: accessor_pair_required
        when: mut_prop
      - id: supports_open_override_redef
        op: inheritance_modifiers_allowed
      - id: mut_prop_not_for_certain_types
        op: mut_prop_type_restriction
        note: "mut prop not valid for types: numeric (Int/UInt/Float), Bool, Unit, Nothing, String, Range, Rune, enum, function types, Tuple."
      - id: accessor_signatures
        op: getter_setter_types
        note: "getter: () -> T, setter: (T) -> Unit."

  # ========== CONTROL FLOW ==========

  - id: if_expr
    kind: expression
    category: control
    summary: Conditional expression. Value is the last expression of the executed branch.
    syntax:
      canonical: |
        if (x > 0) {
            "positive"
        } else {
            "non-positive"
        }
      variants:
        - |
          if (let Some(v) <- opt) {
              println(v)
          }
        - |
          if (let Some(v) <- opt && v > 0) {
              println(v)
          }
    semantic_rules:
      - id: condition_must_be_bool
        op: expression_type_is
        expected_type: Bool
        diagnostic: if_condition_not_bool
      - id: without_else_returns_unit
        op: infer_result_type
        when: else_absent
        result_type: Unit
      - id: with_else_type_is_common_parent
        op: infer_result_type
        when: else_present
        result_type: common_parent_of_branches
      - id: if_let_binds_in_then_branch_only
        op: pattern_binding_scope
        note: "Binding variables from if-let are only visible in the then branch, not in else."
      - id: if_let_logical_ops
        op: if_let_conditions
        note: "&& right side can be Bool or another let pattern. || patterns cannot have variable bindings (only _ allowed)."
    prerequisites: [expression, block_exprs, pattern]

  - id: while_loop
    kind: expression
    category: control
    summary: Pre-condition and post-condition loops. Return type is always Unit.
    syntax:
      canonical: |
        while (cond) {
            exprs
        }
      variants:
        - |
          do {
              exprs
          } while (cond)
        - |
          while (let Some(v) <- iter.next()) {
              println(v)
          }
    semantic_rules:
      - id: condition_must_be_bool
        op: expression_type_is
        expected_type: Bool
        diagnostic: while_condition_not_bool
      - id: loop_returns_unit
        op: result_type_is
        type: Unit
      - id: break_continue_supported
        op: loop_control
        note: "break exits loop; continue skips to next iteration. Both have type Nothing."

  - id: for_in_loop
    kind: expression
    category: control
    summary: Iterate over Iterable sources with optional destructuring and where filtering. Returns Unit.
    syntax:
      canonical: |
        for (i in 0..=10 where i % 2 == 0) {
            println(i)
        }
      variants:
        - "for ((k, v) in pairs) { println(k) }"
        - "for (_ in 0..5) { println(\"tick\") }"
    semantic_rules:
      - id: source_must_be_iterable
        op: expression_implements_interface
        expected_interface: Iterable
        diagnostic: for_in_requires_iterable
      - id: source_evaluated_once
        op: single_evaluation
        note: "Source expression evaluated once; then iterator() called; loop calls next() until None."
      - id: where_must_be_bool
        op: expression_type_is
        expected_type: Bool
        when: filter_present
      - id: iteration_variable_is_immutable
        op: binding_is_let
        note: Iteration variable cannot be modified (compile error if attempted).
      - id: break_continue_supported
        op: loop_control
        note: "break exits loop; continue skips to next iteration."
      - id: returns_unit
        op: result_type_is
        type: Unit
      - id: string_iterates_bytes
        op: string_iteration_note
        note: "for (b in str) iterates UInt8 bytes (UTF-8). Use for (r in str.runes()) for Rune characters."
    prerequisites: [pattern, expression, block_exprs]

  - id: match_expr
    kind: expression
    category: control
    summary: Pattern matching expression with exhaustive coverage. First matching case wins.
    syntax:
      canonical: |
        match (value) {
            case Some(x) => x
            case None => 0
        }
      variants:
        - |
          match {
              case x > 0 => "positive"
              case _ => "non-positive"
          }
        - |
          match (value) {
              case x where x > 0 => "positive"
              case _ => "other"
          }
    semantic_rules:
      - id: case_order_significant
        op: first_matching_case_wins
      - id: must_be_exhaustive
        op: cases_exhaustive
        diagnostic: match_not_exhaustive
      - id: guard_uses_where_keyword
        op: guard_syntax
        note: "Guard syntax is 'case pattern where condition =>', not 'if'. Condition must be Bool."
      - id: case_body_no_braces
        op: case_body_is_bare_exprs
        note: "=> is followed by exprs directly, not wrapped in {}."
      - id: result_type_is_common_parent
        op: infer_result_type
        note: "Match expression type = common parent type of all case body types."
      - id: no_fallthrough
        op: single_case_execution
        note: Only the first matching case is executed; no fall-through to subsequent cases.
    pattern_kinds:
      - constant_pattern: "Numeric, Bool, Rune, String (no interpolation), Unit literals"
      - wildcard_pattern: "_ matches anything"
      - binding_pattern: "id binds value to immutable variable (scoped to case)"
      - tuple_pattern: "(p1, p2, ...) destructures tuples"
      - type_pattern: "id: Type or _: Type for runtime type check"
      - enum_pattern: "Constructor or Constructor(p1, ...) for enum matching"
    prerequisites: [expression, pattern]

  # ========== TYPE DECLARATIONS ==========

  - id: class_decl
    kind: declaration
    category: type
    summary: Reference type with single inheritance, constructors (init/primary), static init, abstract/sealed variants, and optional finalizer (~init).
    syntax:
      canonical: |
        open class Animal {
            var name: String
            public init(name: String) { this.name = name }
            public open func speak(): Unit { println(name) }
        }
      variants:
        - "abstract class Shape { public func area(): Float64 }"
        - "sealed abstract class Expr {}"
        - "class Dog <: Animal { public override func speak(): Unit { println(\"Woof\") } }"
        - |
          class Pair {
              public Pair(let first: Int64, let second: Int64) {}
          }
        - |
          class Res {
              public init() {}
              ~init() { println("releasing") }
          }
    semantic_rules:
      - id: top_level_only
        op: declaration_scope_is
        expected_scope: top_level
      - id: single_inheritance
        op: at_most_one_superclass
        note: "class B <: A { }. A must be open or abstract. Default parent is Object."
      - id: override_requires_open_parent
        op: parent_member_must_be_open
        note: "Instance: override. Static: redef. Name and param signature must match."
      - id: primary_constructor
        op: primary_constructor_syntax
        note: "Declared inside class body with ClassName as name: class C { public C(let x: T, var y: T) {} }. At most one, creates fields from params. Can use super(args) but cannot coexist with this() call."
      - id: static_init
        op: static_init_block
        note: "static init() { } — one per class, inits uninitialized static members, no access mods."
      - id: init_execution_order
        op: constructor_order
        note: "1) Member default values. 2) super()/this() call (first expr in body, mutually exclusive). 3) Constructor body. Implicit super() if parent has parameterless init."
      - id: static_instance_name_conflict
        op: member_name_conflict_disallowed
        diagnostic: duplicate_top_level_symbol
        note: Same name for static and instance member is not allowed even with different params.
      - id: non_abstract_satisfies_abstract_members
        op: abstract_members_satisfied
        diagnostic: interface_member_not_implemented
      - id: finalizer_class_cannot_be_open
        op: has_finalizer_implies_not_open
        note: "~init() — no params/return/generics/mods. At most one. Not in extend."
      - id: sealed_class_same_package
        op: sealed_restriction
        note: "sealed abstract class: subclasses must be in the same package. The sealed modifier on the type itself implies public and open semantics (so it can be inherited within the package)."
      - id: this_type
        op: This_type_placeholder
        note: "This type in return position resolves to the actual subclass type at each level."
      - id: auto_generated_init
        op: default_init
        note: "public init() auto-generated if all instance members have initializers and no custom constructors defined."
    prerequisites: [identifier, block_exprs, generic_parameters]

  - id: struct_decl
    kind: declaration
    category: type
    summary: Value type with copy-on-assignment semantics. Supports mut methods. Cannot be recursive.
    syntax:
      canonical: |
        struct Point {
            var x: Int64 = 0
            var y: Int64 = 0
            public mut func move(dx: Int64, dy: Int64): Unit {
                x += dx
                y += dy
            }
        }
      variants:
        - |
          struct Pair {
              public Pair(let first: Int64, let second: Int64) {}
          }
    semantic_rules:
      - id: top_level_only
        op: declaration_scope_is
        expected_scope: top_level
      - id: no_recursive_fields
        op: recursive_value_type_disallowed
        diagnostic: struct_recursive_field
        note: Direct or indirect recursion in value-type fields is forbidden.
      - id: primary_constructor
        op: primary_constructor_syntax
        note: "Declared inside struct body with StructName as name: struct S { public S(let x: T, var y: T) {} }. Same syntax as class primary constructor."
      - id: static_init
        op: static_init_block
        note: "static init() { } — one per struct, inits uninitialized static members, no access mods."
      - id: mut_call_requires_var_binding
        op: mut_method_call_requires_var_binding
      - id: let_binding_blocks_mut_calls
        op: let_struct_cannot_call_mut
        diagnostic: let_struct_cannot_call_mut
      - id: mut_func_restrictions
        op: mut_method_constraints
        note: |
          In mut func: this cannot be captured in lambda or nested function.
          Cannot return this. Cannot assign this to variable.
          Instance members cannot be captured by inner lambda in mut func.
          Non-mut func cannot call mut func on this.
          mut func cannot be used as first-class value from struct variable (ok from interface variable).
      - id: copy_on_assignment
        op: value_semantics
        note: "Assigning struct copies the value. Modifying copy does not affect original."
      - id: auto_generated_init
        op: default_init
        note: "public init() auto-generated if all members have initializers and no custom constructors."
    prerequisites: [identifier, block_exprs, generic_parameters]

  - id: interface_decl
    kind: declaration
    category: type
    summary: Behavior contract with implicitly public members. Supports default implementations, sealed variant, interface inheritance, and static members.
    syntax:
      canonical: |
        interface Flyable {
            func fly(): Unit
        }
      variants:
        - |
          interface Calculable <: Addable & Subtractable {
              func mul(other: Int64): Int64
          }
        - "sealed interface Shape { func area(): Float64 }"
        - |
          interface Printable {
              func display(): Unit {
                  println("default display")
              }
          }
    semantic_rules:
      - id: members_implicitly_public
        op: disallow_extra_access_modifier
        note: "All members are implicitly public and open. Access modifiers are not needed."
      - id: any_is_root_interface
        op: all_interfaces_inherit_any
        note: "All interfaces implicitly inherit the built-in Any interface."
      - id: implementor_must_satisfy_contract
        op: interface_contract_satisfied
        diagnostic: interface_member_not_implemented
      - id: mut_func_struct_must_match
        op: mut_modifier_match_on_struct
        note: "Struct implementation must match mut modifier exactly. Class implementation ignores mut."
      - id: default_implementation
        op: default_impl_allowed
        note: "Interface functions can have bodies (default impl). Implementors inherit or override."
      - id: diamond_default_resolution
        op: diamond_conflict_resolution
        note: "When two unrelated parent interfaces provide conflicting defaults, the implementor must resolve explicitly."
      - id: static_members
        op: static_in_interface
        note: "Static members can have default impl. Accessible via interface name (if impl provided) or via type name in generic constraint."
      - id: implementable_types
        op: impl_type_restriction
        note: "Cannot be implemented by Tuple, VArray, or function types."
    prerequisites: [identifier, block_exprs, generic_parameters]

  - id: enum_decl
    kind: declaration
    category: type
    summary: Tagged union with named constructors, optional payloads, member functions, and properties. No member variables.
    syntax:
      canonical: |
        enum Expr {
            | Num(Int64)
            | Add(Expr, Expr)
            | Neg(Expr)
        }
      variants:
        - "enum Direction { | Up | Down | Left | Right }"
        - "enum Token { | Number | Plus | ... }"
    semantic_rules:
      - id: top_level_only
        op: declaration_scope_is
        expected_scope: top_level
      - id: at_least_one_named_constructor
        op: minimum_case_count
        min: 1
      - id: no_member_variables
        op: disallow_member_variables
        note: "Enums cannot have member variables. Only constructors, functions, operators, and properties."
      - id: same_name_constructor_overloading
        op: constructor_overload_by_param
        note: "Constructors can have the same name with different parameter counts."
      - id: ellipsis_case_must_be_last
        op: ellipsis_case_last
        note: "... marks non-exhaustive enum. Match must use _ or binding pattern for remaining cases."
      - id: member_names_disjoint_from_constructors
        op: name_sets_disjoint
        diagnostic: duplicate_top_level_symbol
      - id: no_default_equatable
        op: requires_manual_operator
        note: "Enums do not support == by default. Implement operator func ==(rhs: EnumType): Bool manually or use match-based comparison."
      - id: recursive_enum_via_payload
        op: recursive_constructor_allowed
        note: "Constructor parameters can reference the enum type itself (recursive enum)."
      - id: constructor_name_no_keyword
        op: keywords_disallowed_as_constructors
        note: "Cannot use keywords as constructor names. Use backtick escape or rename."
    prerequisites: [identifier, generic_parameters]

  # ========== GENERICS ==========

  - id: generic_parameters
    kind: modifier
    category: type
    summary: Parameterize functions and named types with type variables and where constraints.
    syntax:
      canonical: "func id<T>(value: T): T { value }"
      variants:
        - "class Box<T> { let value: T }"
        - "func printItem<T>(value: T): Unit where T <: ToString { println(value) }"
        - "interface Container<T> { func get(): T }"
        - "enum Tree<T> { | Leaf(T) | Node(Tree<T>, Tree<T>) }"
    semantic_rules:
      - id: constraint_must_be_class_or_interface
        op: generic_upper_bound_kind_allowed
        diagnostic: generic_constraint_invalid
      - id: multiple_class_bounds_single_chain
        op: class_upper_bounds_single_inheritance_chain
        note: "If multiple class upper bounds, they must form a single inheritance chain."
      - id: user_defined_generics_invariant
        op: variance_rule
        mode: invariant
        note: "For user-defined types, T<A> <: T<B> only if A = B."
      - id: builtin_variance_exceptions
        op: builtin_variance
        note: "Tuple: covariant per element. Function: contravariant params, covariant return."
      - id: static_members_cannot_reference_type_params
        op: static_no_type_param
        note: "Static member type declarations and expressions cannot reference enclosing type parameters."
    prerequisites: [identifier, type_expr]

  # ========== TYPE SYSTEM ==========

  - id: type_alias
    kind: declaration
    category: type
    summary: Create an alternative name for an existing type. Not a new type.
    syntax:
      canonical: "type IntList = ArrayList<Int64>"
      variants:
        - "type Callback = (Int64) -> Unit"
        - "type Pair<A, B> = (A, B)"
    semantic_rules:
      - id: top_level_only
        op: declaration_scope_is
        expected_scope: top_level
      - id: no_cyclic_aliases
        op: acyclic_aliases
        diagnostic: type_alias_cycle
      - id: alias_cannot_be_used_for_type_conversion
        op: disallow_alias_conversion
        note: "Alias is not a distinct type; cannot be used for conversion expressions."
      - id: alias_can_have_type_params
        op: alias_generics
        note: "type Pair<A, B> = (A, B) is valid. No where constraints on alias."
      - id: alias_usable_as_constructor
        op: alias_constructor_access
        note: "Alias can be used as type name, constructor, static member accessor, and enum constructor accessor."

  - id: type_check_cast
    kind: expression
    category: type
    summary: Runtime type checking (is) and safe downcasting (as) to Option.
    syntax:
      canonical: |
        if (obj is Derived) { println("yes") }
        let d = obj as Derived
      variants:
        - "let n = Int64(someInt32)"
    semantic_rules:
      - id: is_returns_bool
        op: result_type_is
        type: Bool
      - id: as_returns_option
        op: result_type_is
        type: Option
      - id: numeric_conversion_via_constructor
        op: type_constructor_conversion
        note: "No implicit conversions. Use T(expr) syntax for numeric and Rune conversions. Overflow is compile-time error or runtime exception."
      - id: rune_conversion_ranges
        op: rune_convert_restriction
        note: "Rune(intExpr) valid only for [0x0000, 0xD7FF] and [0xE000, 0x10FFFF]. UInt32(runeExpr) always valid."

  # ========== EXTENSIONS ==========

  - id: extend_decl
    kind: declaration
    category: syntax
    summary: Add functions, properties, operators, and interface implementations to existing types without modifying their definition.
    syntax:
      canonical: |
        extend String {
            public func printSize(): Unit {
                println("the size is ${this.size}")
            }
        }
      variants:
        - |
          extend<T> Array<T> <: PrintSizeable {
              public func printSize(): Unit {
                  println("The size is ${this.size}")
              }
          }
        - |
          extend Foo<Int64> {
              public func show(): Unit { println("Foo<Int64>") }
          }
    semantic_rules:
      - id: cannot_add_stored_fields
        op: disallow_stored_members
        diagnostic: extend_cannot_add_stored_field
      - id: cannot_use_open_override_redef
        op: disallow_modifiers
        modifiers: [open, override, redef]
      - id: cannot_access_private_members
        op: access_level_restriction
        min_visible: internal
      - id: generic_extend_params_must_be_used
        op: all_type_params_referenced
      - id: orphan_rule
        op: type_or_interface_must_be_local
        note: "Extension type OR interface must be in the same package as the extend declaration."
      - id: only_named_types
        op: extendable_type_restriction
        note: "Cannot extend functions, tuples, or interfaces directly."
      - id: struct_mut_func_in_extend
        op: mut_in_extend
        note: "Can add mut func to struct via extend. Same mut restrictions apply."
      - id: cannot_redefine_existing_members
        op: no_redefine_in_extend
      - id: can_add_operators
        op: operator_in_extend
        note: "extend can add operator func."

  # ========== OPTION ==========

  - id: option_type
    kind: expression
    category: type
    summary: Option<T> usage patterns including ?T shorthand, ??, ?., getOrThrow, if-let, and while-let.
    syntax:
      canonical: |
        let a: ?Int64 = 100
        let v = a ?? 0
        let r = a?.toString()
      variants:
        - |
          if (let Some(v) <- opt) {
              println(v)
          }
        - |
          while (let Some(item) <- iter.next()) {
              println(item)
          }
        - "let v = opt.getOrThrow()"
        - "let x: ?Int64 = None"
    semantic_rules:
      - id: auto_wrapping_when_context_expects_option
        op: implicit_some_wrapping
        note: "When context expects Option<T>, a plain T value is auto-wrapped to Some(T)."
      - id: coalescing_short_circuits
        op: short_circuit_evaluation
        target: "??"
      - id: optional_chain_short_circuits
        op: short_circuit_evaluation
        target: "?."
        note: "Supports member access, function calls, subscript, and trailing lambda: opt?.member, opt?.func(), opt?[i], opt?{lambda}."
      - id: getOrThrow_throws_NoneValueException
        op: throws_on_none
      - id: none_explicit_type_hint
        op: none_disambiguation
        note: "When type cannot be inferred: None<T> provides explicit type."

  # ========== ERROR HANDLING ==========

  - id: error_handling
    kind: expression
    category: control
    summary: Exception-based error handling with throw, try/catch/finally, and try-with-resources.
    syntax:
      canonical: |
        try {
            throw IllegalArgumentException("bad input")
        } catch (e: IllegalArgumentException) {
            println(e.message)
        } finally {
            println("cleanup")
        }
      variants:
        - |
          try (r = Worker("Tom")) {
              r.work()
          }
        - "catch (e: E1 | E2) { println(e) }"
        - "catch (_) { println(\"unknown\") }"
    semantic_rules:
      - id: throw_only_exception_subtypes
        op: expression_type_is
        expected_type: Exception
        diagnostic: throw_requires_exception_subtype
        note: "Cannot throw Error or its subclasses. throw type is Nothing."
      - id: try_with_resources_requires_Resource_interface
        op: expression_implements_interface
        expected_interface: Resource
        note: "Syntax: try (var = resourceExpr) { body }. Resources comma-separated. Auto-closes if isClosed() is false."
      - id: try_with_resources_returns_unit
        op: result_type_is
        type: Unit
        when: try_with_resources
      - id: finally_always_executes
        op: guaranteed_execution
        note: "Finally block runs on normal exit, throw, break, continue, or return."
      - id: catch_pattern_order_matters
        op: first_matching_catch_wins
      - id: catch_union_pattern
        op: catch_union_syntax
        note: "catch (e: E1 | E2 | E3) binds e to the common parent type."
      - id: custom_exception_extends_Exception_only
        op: inheritance_restricted_to
        base: Exception
        note: "Cannot extend Error or its subclasses."
      - id: try_expr_type
        op: try_result_type
        note: "try expression type = common parent of try block + all catch blocks (finally excluded)."

  # ========== CONCURRENCY ==========

  - id: concurrency
    kind: expression
    category: concurrency
    summary: "M:N user-space threading with spawn, Future, Mutex, Condition, synchronized, atomic operations, ThreadLocal, sleep(Duration), and std.sync coordination utilities."
    syntax:
      canonical: |
        let f = spawn { =>
            heavyComputation()
        }
        let result = f.get()
      variants:
        - |
          synchronized(mtx) {
              sharedData += 1
          }
        - |
          let counter = AtomicInt64(0)
          counter.fetchAdd(1)
        - "let tl = ThreadLocal<String>()"
        - "sleep(Duration.second)"
    semantic_rules:
      - id: spawn_takes_no_arg_lambda
        op: lambda_param_count
        count: 0
      - id: spawn_returns_future
        op: result_type_is
        type: Future
      - id: main_exit_kills_spawned_threads
        op: thread_lifetime_warning
        note: "Spawned threads are killed when main returns. Use Future.get() to wait."
      - id: mutex_is_reentrant
        op: reentrant_lock
        note: "Mutex is reentrant for the same thread. unlock() without lock throws IllegalSynchronizationStateException."
      - id: mutex_condition_requires_lock
        op: condition_created_under_lock
        note: "mutex.condition() must be called while holding the lock."
      - id: condition_wait_in_loop
        op: spurious_wakeup_pattern
        note: "Use waitUntil(predicate) or loop with wait() + predicate check for spurious wakeups."
      - id: synchronized_auto_unlock
        op: synchronized_scoped
        note: "synchronized(mtx) { ... } auto-locks on enter, auto-unlocks on exit (including break/continue/return/throw)."
      - id: cancel_is_cooperative
        op: cooperative_cancellation
        note: "Future.cancel() sends a request; thread must check Thread.currentThread.hasPendingCancellation."
      - id: atomic_operations
        op: atomic_api
        note: "Atomics include AtomicInt*/UInt*, AtomicBool, AtomicReference<T>, and AtomicOptionReference<T>. All support load, store, swap, compareAndSwap. Integer atomics also support fetchAdd, fetchSub, fetchAnd, fetchOr, fetchXor. All return the pre-modify value."
      - id: sync_counter
        op: sync_counter_api
        note: "SyncCounter: dec() decrements, waitUntilZero() blocks until zero. For coordinating N threads."
      - id: sleep_function
        op: sleep_api
        note: "sleep(Duration): blocks current thread at least dur. dur <= Zero just yields."
      - id: timer_api
        op: timer_primitives
        note: "Timer.once(delay, task) and Timer.repeat(delay, interval, task) return Timer. timer.cancel() stops future invocations."
      - id: extra_sync_primitives
        op: coordination_primitives
        note: "std.sync also provides Barrier, Semaphore, and ReadWriteLock for phased coordination or bounded concurrency."

  # ========== ANNOTATIONS & REFLECTION ==========

  - id: annotation_decl
    kind: declaration
    category: meta
    summary: Define and use annotations with @Annotation, and access type info via reflection at runtime.
    syntax:
      canonical: |
        @Annotation
        public class Version {
            let code: String
            const init(code: String) { this.code = code }
        }

        @Version["1.0"]
        class MyService {}
      variants:
        - "@OverflowWrapping func wrap(): Int8 { Int8(200) }"
        - "@OverflowSaturating func sat(): Int8 { Int8(-200) }"
        - "@Annotation[target: [MemberFunction]] public class FuncOnly { const init() {} }"
        - |
          let info = TypeInfo.of(obj)
          let v = info.getInstanceVariable("name")
    semantic_rules:
      - id: annotation_class_must_have_const_init
        op: requires_const_init
      - id: annotation_class_not_abstract_open_sealed
        op: disallow_modifiers
        modifiers: [abstract, open, sealed]
      - id: same_annotation_not_applied_twice
        op: unique_annotation_per_target
      - id: annotations_not_inherited
        op: no_inheritance_of_annotations
        note: "Subclass does not inherit parent's annotations."
      - id: annotation_target_restriction
        op: target_kind_check
        diagnostic: annotation_target_mismatch
        note: "Restrict via @Annotation[target: [Type, ...]]."
      - id: annotation_kinds
        op: annotation_kind_enum
        values: [Type, Parameter, Init, MemberProperty, MemberFunction, MemberVariable, EnumConstructor, GlobalFunction, GlobalVariable, Extension]
      - id: reflection_only_sees_public_members
        op: visibility_restriction
        min_visible: public
      - id: overflow_annotations
        op: overflow_behavior
        note: "@OverflowThrowing (default, throw on overflow), @OverflowWrapping (truncate), @OverflowSaturating (clamp). Apply to function decl."
      - id: reflection_no_uninstantiated_generics
        op: typeinfo_restriction
        note: "Cannot get TypeInfo of uninstantiated generic types."

  # ========== C INTEROP ==========

  - id: cffi
    kind: declaration
    category: interop
    summary: Interoperate with C via foreign declarations, unsafe blocks, CPointer, CFunc, @C struct, inout, and calling conventions.
    syntax:
      canonical: |
        foreign func rand(): Int32

        main() {
            let r = unsafe { rand() }
            println(r)
        }
      variants:
        - |
          foreign {
              func malloc(size: UIntNative): CPointer<Unit>
              func free(ptr: CPointer<Unit>): Unit
          }
        - |
          @C
          struct Point {
              var x: Int64 = 0
              var y: Int64 = 0
          }
        - |
          @C
          func callback(p: CPointer<Int8>): Unit {
              println("from C")
          }
        - "unsafe { f(inout n) }"
        - "foreign func printf(fmt: CPointer<UInt8>, ...): Int32"
    semantic_rules:
      - id: foreign_func_params_must_be_ctype
        op: type_constraint_check
        constraint: CType
        diagnostic: foreign_param_not_ctype
      - id: foreign_call_requires_unsafe
        op: context_required
        context: unsafe
        diagnostic: unsafe_context_required
        note: "unsafe does not propagate into lambdas inside the unsafe block — those need their own unsafe."
      - id: c_struct_no_interfaces_no_generics
        op: disallow_features_on_c_struct
        disallowed: [interface_impl, generic_params, closure_capture]
        note: "@C struct members must be CType only. Memory layout is C-compatible."
      - id: inout_only_for_cfunc_call
        op: inout_usage_restricted
        note: "inout only on var bindings (stack variables) at CFunc call site. Not for class member fields."
      - id: calling_convention
        op: annotation_values
        values: [CDECL, STDCALL]
        note: "@CallingConv[CDECL] (default) or @CallingConv[STDCALL] (Windows API). Applies to foreign blocks, functions, or top-level CFunc."
      - id: foreign_varargs
        op: c_varargs_support
        note: "foreign func can have ... as last parameter for C variadic functions."
      - id: varray_in_cffi
        op: varray_cffi_usage
        note: "VArray<T, $N> can be used in @C struct. As function params, pass via inout (converts to CPointer<T>)."
      - id: cstring_lifecycle
        op: cstring_alloc_free
        note: "Create via LibC.mallocCString(str). Free via LibC.free(cstr). Or use asResource() with try-with-resources."
      - id: memory_management
        op: cffi_memory
        note: "LibC.malloc<T>(count), LibC.free<T>(ptr). CPointerResource/CStringResource for auto-management. acquireArrayRawData/releaseArrayRawData for zero-copy Array access."
