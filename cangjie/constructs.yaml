# Construct definitions have been split by language feature into the constructs/ subdirectory.
# Each file contains a `constructs:` key with a list of related constructs.
#
# Files (in canonical order):
#   constructs/module.yaml         - package_unit, main_entry
#   constructs/variable.yaml       - variable_decl, const_decl
#   constructs/function.yaml       - function_decl, lambda_expr, operator_overload, property_decl
#   constructs/control_flow.yaml   - if_expr, while_loop, for_in_loop, match_expr
#   constructs/class.yaml          - class_decl
#   constructs/struct.yaml         - struct_decl
#   constructs/interface.yaml      - interface_decl
#   constructs/enum.yaml           - enum_decl
#   constructs/generic.yaml        - generic_parameters
#   constructs/type_system.yaml    - type_alias, type_check_cast
#   constructs/extend.yaml         - extend_decl
#   constructs/option.yaml         - option_type
#   constructs/error_handling.yaml - error_handling
#   constructs/concurrency.yaml    - concurrency
#   constructs/annotation.yaml     - annotation_decl
#   constructs/cffi.yaml           - cffi

constructs_dir: constructs
constructs_files:
  - module.yaml
  - variable.yaml
  - function.yaml
  - control_flow.yaml
  - class.yaml
  - struct.yaml
  - interface.yaml
  - enum.yaml
  - generic.yaml
  - type_system.yaml
  - extend.yaml
  - option.yaml
  - error_handling.yaml
  - concurrency.yaml
  - annotation.yaml
  - cffi.yaml
