exception_hierarchy:
  Error: "System/resource errors — should NOT be caught or subclassed (OutOfMemoryError, StackOverflowError)"
  Exception: "Logic/IO errors — can be caught; base class for user-defined exceptions"
  members: ["message: String", "toString(): String", "printStackTrace(): Unit"]
  custom: |
    open class BusinessException <: Exception {
        public init(msg: String) { super(msg) }
    }
    class InsufficientFundsException <: BusinessException {
        public init(amount: Float64) { super("Insufficient funds: ${amount}") }
    }
  common_runtime:
    - ArithmeticException
    - IllegalArgumentException
    - NegativeArraySizeException
    - NoneValueException
    - OverflowException
    - ConcurrentModificationException
    - IndexOutOfBoundsException

throwing:
  syntax: "throw ExceptionInstance"
  unchecked: "No throws declaration; compiler does NOT enforce catching; unhandled → crash"
  example: |
    func divide(a: Int64, b: Int64): Int64 {
        if (b == 0) { throw ArithmeticException("Division by zero") }
        return a / b
    }

try_catch_finally:
  basic: |
    try {
        riskyOperation()
    } catch (e: SpecificException) {
        handleSpecific(e)
    } catch (e: Exception) {
        handleGeneral(e)
    } finally {
        cleanup()
    }
  as_expression: |
    let result = try { parseInt(input) } catch (_: Exception) { 0 }
  catch_patterns:
    type: "catch (e: ExceptionType)"
    multi_type: "catch (e: Type1 | Type2)"
    wildcard: "catch (_)"
  try_with_resources: |
    try (resource = acquireResource()) {
        useResource(resource)
    }
    // resource.close() called automatically
    // Resource must implement Resource interface { isClosed(): Bool; close(): Unit }
    // Always returns Unit; close() called even on exception

option_error_handling:
  coalesce: "opt ?? \"Anonymous\""
  chain: "user?.profile?.name?.size  // → ?Int64"
  unwrap: "opt.getOrThrow()  // throws NoneValueException if None"
  pattern: |
    match (findUser(id)) {
        case Some(user) => println(user.name)
        case None => println("User not found")
    }
  if_let: |
    if (let Some(user) <- findUser(id)) { println(user.name) }

best_practices:
  - "Exception for unexpected failures; Option<T> for expected absence"
  - "Catch specific types, not bare Exception"
  - "Use try-with-resources for Resource implementations"
  - "Custom exceptions should extend Exception, not Error"
