learning:
  audience: large_language_model
  objective: Learn the complete Cangjie core syntax and semantics from structured examples covering every construct and major diagnostic.

  curriculum:
    - step: 1
      topic: package_unit
      focus: package placement, import ordering, access modifiers, re-export
    - step: 2
      topic: main_entry
      focus: program entry point declaration without func keyword
    - step: 3
      topic: variable_decl
      focus: let, var, const, tuple destructuring, value vs reference semantics
    - step: 4
      topic: const_decl
      focus: compile-time const expressions, const functions, const init
    - step: 5
      topic: function_decl
      focus: typed parameters, named params (!), default values, varargs, pipe |>, compose ~>
    - step: 6
      topic: lambda_expr
      focus: anonymous functions, trailing lambda, closure semantics, var capture restrictions
    - step: 7
      topic: if_expr
      focus: expression-oriented conditional, if-let binding, && and || in conditions
    - step: 8
      topic: while_loop
      focus: while, do-while, while-let, break/continue
    - step: 9
      topic: for_in_loop
      focus: iterable source, where filter, destructuring, string byte iteration
    - step: 10
      topic: match_expr
      focus: patterns, where guards, exhaustiveness, first-match, no fallthrough
    - step: 11
      topic: class_decl
      focus: reference type, init/primary constructor, static init, inheritance, open/override, sealed, ~init, This type
    - step: 12
      topic: struct_decl
      focus: value type, mut methods and restrictions, primary constructor, no recursion
    - step: 13
      topic: interface_decl
      focus: behavior contracts, implicit public, default impl, diamond resolution, sealed, Any
    - step: 14
      topic: enum_decl
      focus: tagged union, constructors, no member variables, recursive enum, ... non-exhaustive
    - step: 15
      topic: generic_parameters
      focus: type variables, where constraints, invariant (user types), covariant (tuple/function)
    - step: 16
      topic: operator_overload
      focus: operator func inside types, overloadable set, compound assignment auto-enable
    - step: 17
      topic: property_decl
      focus: prop / mut prop, get/set accessors, mut prop type restrictions
    - step: 18
      topic: type_alias
      focus: type aliases, no cycles, generic aliases, not a new type
    - step: 19
      topic: type_check_cast
      focus: is returns Bool, as returns Option, T(expr) numeric conversion, Rune ranges
    - step: 20
      topic: extend_decl
      focus: retroactive method addition, interface conformance, orphan rule, operators in extend
    - step: 21
      topic: option_type
      focus: "?T sugar, ??, ?., if-let, while-let, getOrThrow, None<T>"
    - step: 22
      topic: error_handling
      focus: throw/try/catch/finally, try-with-resources, catch union, Exception hierarchy
    - step: 23
      topic: concurrency
      focus: spawn, Future, Mutex, Condition, synchronized, atomics, SyncCounter, sleep, cooperative cancel
    - step: 24
      topic: annotation_decl
      focus: "@Annotation class, AnnotationKind targets, overflow annotations, reflection TypeInfo"
    - step: 25
      topic: cffi
      focus: foreign func, unsafe blocks, CPointer, @C struct, inout, CString, varargs, @CallingConv

  canonical_examples:
    # --- Module ---
    - id: package_and_import
      construct: package_unit
      demonstrates:
        - package_first
        - import_before_declarations
        - wildcard_import
        - re_export
      code: |
        package default.network.http
        import std.collection.*
        public import default.network.common.{Request, Response}

    - id: program_entry_point
      construct: main_entry
      demonstrates:
        - main_without_func_keyword
        - return_code
      code: |
        main(): Int64 {
            println("Hello, Cangjie!")
            return 0
        }

    - id: main_with_args
      construct: main_entry
      demonstrates:
        - command_line_params
      code: |
        main(args: Array<String>): Unit {
            for (arg in args) {
                println(arg)
            }
        }

    # --- Bindings ---
    - id: immutable_and_mutable_bindings
      construct: variable_decl
      demonstrates:
        - let_is_single_assignment
        - var_is_mutable
        - type_inference
        - tuple_destructuring
      code: |
        let name: String = "cj"
        var count = 0
        count += 1
        let (a, b) = (1, 2)
        var (x, y) = (3, 4)
        (x, y) = (y, x)

    - id: const_expression
      construct: const_decl
      demonstrates:
        - compile_time_constant
        - const_function
      code: |
        const PI = 3.14159265
        const func square(x: Float64): Float64 { x * x }
        const AREA = square(PI)

    # --- Functions ---
    - id: basic_function
      construct: function_decl
      demonstrates:
        - positional_parameters
        - explicit_return_type
        - return_expression
      code: |
        func add(a: Int64, b: Int64): Int64 {
            return a + b
        }

    - id: named_parameter_function
      construct: function_decl
      demonstrates:
        - named_parameter_with_bang
        - default_value
      code: |
        func format(value: Int64, indent!: Int64 = 2): String {
            " " * indent + value.toString()
        }
        let s = format(42, indent: 4)

    - id: varargs_function
      construct: function_decl
      demonstrates:
        - varargs_desugar_to_array
      code: |
        func printAll(items: Array<String>): Unit {
            for (s in items) { println(s) }
        }
        printAll("a", "b", "c")

    - id: pipe_and_compose
      construct: function_decl
      demonstrates:
        - pipe_operator
        - compose_operator
      code: |
        func double(x: Int64): Int64 { x * 2 }
        func incr(x: Int64): Int64 { x + 1 }
        let r1 = 5 |> double
        let transform = double ~> incr
        let r2 = transform(5)

    - id: lambda_value
      construct: lambda_expr
      demonstrates:
        - anonymous_function
        - inferred_return
      code: |
        let square = { x: Int64 =>
            x * x
        }

    - id: trailing_lambda
      construct: lambda_expr
      demonstrates:
        - trailing_lambda_syntax
        - arrow_optional_in_trailing
      code: |
        func apply(f: (Int64) -> Int64): Int64 { f(5) }
        let result = apply { i => i * i }

    # --- Control Flow ---
    - id: conditional_expression
      construct: if_expr
      demonstrates:
        - if_is_expression
        - bool_condition
      code: |
        let label = if (count > 0) {
            "positive"
        } else {
            "zero-or-negative"
        }

    - id: if_let_binding
      construct: if_expr
      demonstrates:
        - if_let_option_unwrap
        - if_let_with_and_condition
      code: |
        let opt: ?Int64 = 42
        if (let Some(v) <- opt && v > 0) {
            println(v)
        }

    - id: while_and_do_while
      construct: while_loop
      demonstrates:
        - pre_condition_loop
        - post_condition_loop
        - break_continue
      code: |
        var i = 0
        while (i < 10) {
            if (i == 5) { break }
            i += 1
        }
        do {
            i -= 1
        } while (i > 0)

    - id: for_in_range
      construct: for_in_loop
      demonstrates:
        - iterable_source
        - where_filter
      code: |
        for (i in 0..=8 where i % 2 == 0) {
            println(i)
        }

    - id: for_in_destructure
      construct: for_in_loop
      demonstrates:
        - tuple_destructuring
        - hashmap_iteration
      code: |
        let pairs = [(1, "a"), (2, "b")]
        for ((k, v) in pairs) {
            println("${k}: ${v}")
        }

    - id: string_iteration
      construct: for_in_loop
      demonstrates:
        - bytes_vs_runes
      code: |
        let s = "hello"
        for (byte in s) { println(byte) }
        for (ch in s.runes()) { println(ch) }

    - id: option_match
      construct: match_expr
      demonstrates:
        - enum_pattern
        - exhaustive_cases
      code: |
        let result = match (opt) {
            case Some(x) => x
            case None => 0
        }

    - id: match_with_where_guard
      construct: match_expr
      demonstrates:
        - where_guard
        - binding_pattern
      code: |
        let label = match (value) {
            case x where x > 0 => "positive"
            case x where x == 0 => "zero"
            case _ => "negative"
        }

    - id: match_without_value
      construct: match_expr
      demonstrates:
        - value_free_match
      code: |
        let label = match {
            case x > 0 => "positive"
            case _ => "non-positive"
        }

    # --- Type Declarations ---
    - id: class_inheritance
      construct: class_decl
      demonstrates:
        - reference_type
        - open_and_override
        - single_inheritance
        - init_and_super
      code: |
        open class Animal {
            var name: String
            public init(name: String) { this.name = name }
            public open func speak(): Unit { println(name) }
        }
        class Dog <: Animal {
            public init() { super("Dog") }
            public override func speak(): Unit { println("Woof") }
        }

    - id: primary_constructor
      construct: class_decl
      demonstrates:
        - primary_constructor_syntax
        - auto_field_creation
      code: |
        class Pair(let first: Int64, let second: Int64) {}
        let p = Pair(1, 2)

    - id: struct_point
      construct: struct_decl
      demonstrates:
        - value_type
        - mut_method
        - copy_on_assignment
        - let_blocks_mut
      code: |
        struct Point {
            var x: Int64 = 0
            public mut func move(dx: Int64): Unit {
                x += dx
            }
        }
        var p = Point()
        p.move(5)
        let q = p
        // q.move(1) would be a compile error: let binding blocks mut calls

    - id: interface_default_impl
      construct: interface_decl
      demonstrates:
        - behavior_contract
        - default_implementation
        - implicitly_public_members
      code: |
        interface Printable {
            func display(): Unit {
                println("default display")
            }
        }
        class Item <: Printable {}

    - id: enum_expression_tree
      construct: enum_decl
      demonstrates:
        - enum_constructor_with_payload
        - recursive_enum
        - member_function
      code: |
        enum Expr {
            | Num(Int64)
            | Add(Expr, Expr)

            public func eval(): Int64 {
                match (this) {
                    case Num(n) => n
                    case Add(l, r) => l.eval() + r.eval()
                }
            }
        }

    - id: generic_function
      construct: generic_parameters
      demonstrates:
        - type_variable
        - where_constraint
      code: |
        func printAll<T>(items: Array<T>): Unit where T <: ToString {
            for (item in items) {
                println(item)
            }
        }

    # --- Operators & Properties ---
    - id: operator_plus_overload
      construct: operator_overload
      demonstrates:
        - binary_operator_overload
        - compound_assignment_auto
      code: |
        struct Vec2 {
            var x: Float64 = 0.0
            var y: Float64 = 0.0
            public operator func +(r: Vec2): Vec2 {
                Vec2(x + r.x, y + r.y)
            }
        }
        var a = Vec2(1.0, 2.0)
        a += Vec2(3.0, 4.0)

    - id: computed_property
      construct: property_decl
      demonstrates:
        - read_write_property
      code: |
        class Temperature {
            var _celsius: Float64 = 0.0
            mut prop fahrenheit: Float64 {
                get() { _celsius * 1.8 + 32.0 }
                set(f) { _celsius = (f - 32.0) / 1.8 }
            }
        }

    # --- Type System ---
    - id: type_alias_example
      construct: type_alias
      demonstrates:
        - alias_for_generic_type
        - generic_alias
      code: |
        type IntList = ArrayList<Int64>
        type Callback = (Int64) -> Unit
        type Pair<A, B> = (A, B)

    - id: type_check_and_cast
      construct: type_check_cast
      demonstrates:
        - is_check_returns_bool
        - as_returns_option
        - numeric_conversion
      code: |
        let obj: Any = "hello"
        if (obj is String) {
            let s = (obj as String).getOrThrow()
            println(s)
        }
        let n: Int64 = Int64(42i32)

    # --- Extensions ---
    - id: extend_existing_type
      construct: extend_decl
      demonstrates:
        - add_method_to_existing_type
      code: |
        extend String {
            public func shout(): String {
                this.toAsciiUpper() + "!"
            }
        }

    - id: extend_with_interface
      construct: extend_decl
      demonstrates:
        - interface_conformance_via_extend
        - orphan_rule
      code: |
        interface Describable { func describe(): String }
        extend Int64 <: Describable {
            public func describe(): String { this.toString() }
        }

    # --- Option ---
    - id: option_chaining
      construct: option_type
      demonstrates:
        - question_mark_sugar
        - coalesce_operator
        - optional_chain
        - auto_wrapping
      code: |
        let a: ?Int64 = 100
        let v = a ?? 0
        let s = a?.toString()
        let b: ?Int64 = None

    # --- Error Handling ---
    - id: try_catch_finally
      construct: error_handling
      demonstrates:
        - throw_catch_pattern
        - finally_always_runs
        - catch_union
      code: |
        try {
            throw IllegalArgumentException("bad input")
        } catch (e: IllegalArgumentException | IllegalStateException) {
            println(e.message)
        } finally {
            println("cleanup")
        }

    - id: try_with_resources
      construct: error_handling
      demonstrates:
        - resource_auto_close
      code: |
        try (r = openFile("data.txt")) {
            let content = r.readAll()
        }

    # --- Concurrency ---
    - id: spawn_and_future
      construct: concurrency
      demonstrates:
        - spawn_returns_future
        - future_get_blocks
        - cooperative_cancel
      code: |
        let f = spawn { =>
            if (Thread.currentThread.hasPendingCancellation) { return 0 }
            heavyComputation()
        }
        let result = f.get()

    - id: synchronized_mutex
      construct: concurrency
      demonstrates:
        - mutex_is_reentrant
        - condition_created_under_lock
        - synchronized_block
      code: |
        let mtx = Mutex()
        let cond = synchronized(mtx) { mtx.condition() }
        var shared = 0
        synchronized(mtx) {
            shared += 1
            cond.notifyAll()
        }

    - id: sync_counter_coordination
      construct: concurrency
      demonstrates:
        - sync_counter
      code: |
        let counter = SyncCounter(3)
        for (_ in 0..3) {
            spawn { =>
                doWork()
                counter.dec()
            }
        }
        counter.waitUntilZero()

    # --- Annotations ---
    - id: custom_annotation
      construct: annotation_decl
      demonstrates:
        - annotation_class_definition
        - annotation_application
        - annotation_kind_restriction
      code: |
        @Annotation[target: [Type]]
        public class Version {
            let code: String
            const init(code: String) { this.code = code }
        }

        @Version["1.0"]
        class MyService {}

    - id: overflow_annotations
      construct: annotation_decl
      demonstrates:
        - overflow_behavior_control
      code: |
        @OverflowWrapping
        func wrapByte(n: Int64): Int8 { Int8(n) }

        @OverflowSaturating
        func clampByte(n: Int64): Int8 { Int8(n) }

    # --- C FFI ---
    - id: foreign_function_call
      construct: cffi
      demonstrates:
        - foreign_declaration
        - unsafe_block_required
      code: |
        foreign func rand(): Int32

        main(): Int64 {
            let r = unsafe { rand() }
            println(r)
            return 0
        }

    - id: c_struct_interop
      construct: cffi
      demonstrates:
        - c_struct_annotation
        - c_compatible_layout
      code: |
        @C
        struct CPoint {
            var x: Int64 = 0
            var y: Int64 = 0
        }

    - id: foreign_varargs
      construct: cffi
      demonstrates:
        - c_variadic_function
      code: |
        foreign func printf(fmt: CPointer<UInt8>, ...): Int32

  counterexamples:
    - id: package_not_first
      construct: package_unit
      expected_diagnostic: package_must_be_first
      code: |
        import std.collection.*
        package default.demo

    - id: package_path_wrong
      construct: package_unit
      expected_diagnostic: package_path_mismatch
      code: |
        // Assume this file is not located under default/network/ftp/
        package default.network.ftp

    - id: import_after_declaration
      construct: package_unit
      expected_diagnostic: import_before_declarations
      code: |
        let x = 1
        import std.collection.*

    - id: duplicate_top_level_name
      construct: class_decl
      expected_diagnostic: duplicate_top_level_symbol
      code: |
        func parse(): Int64 { 0 }
        let parse = 1

    - id: uninitialized_binding
      construct: variable_decl
      expected_diagnostic: local_variable_uninitialized
      code: |
        var count: Int64
        println(count)

    - id: bad_if_condition
      construct: if_expr
      expected_diagnostic: if_condition_not_bool
      code: |
        if (1) {
            println("bad")
        }

    - id: non_exhaustive_match
      construct: match_expr
      expected_diagnostic: match_not_exhaustive
      code: |
        match (opt) {
            case Some(x) => x
        }

    - id: recursive_struct
      construct: struct_decl
      expected_diagnostic: struct_recursive_field
      code: |
        struct Node {
            let next: Node
        }

    - id: invalid_generic_bound
      construct: generic_parameters
      expected_diagnostic: generic_constraint_invalid
      code: |
        func bad<T>(value: T): T where T <: Int64 {
            value
        }

    - id: bad_while_condition
      construct: while_loop
      expected_diagnostic: while_condition_not_bool
      code: |
        while ("yes") {
            break
        }

    - id: for_in_non_iterable
      construct: for_in_loop
      expected_diagnostic: for_in_requires_iterable
      code: |
        for (item in 42) {
            println(item)
        }

    - id: cyclic_type_alias
      construct: type_alias
      expected_diagnostic: type_alias_cycle
      code: |
        type A = B
        type B = A

    - id: extend_adds_stored_field
      construct: extend_decl
      expected_diagnostic: extend_cannot_add_stored_field
      code: |
        extend String {
            var extra: Int64 = 0
        }

    - id: throw_non_exception
      construct: error_handling
      expected_diagnostic: throw_requires_exception_subtype
      code: |
        throw "not an exception"

    - id: uncaught_exception_example
      construct: error_handling
      expected_diagnostic: uncaught_exception
      code: |
        func fail(): Unit {
            throw IllegalArgumentException("bad input")
        }
        main(): Unit {
            fail()
        }

    - id: interface_missing_impl
      construct: interface_decl
      expected_diagnostic: interface_member_not_implemented
      code: |
        interface I {
            func run(): Int64
        }
        class A <: I {}

    - id: foreign_call_without_unsafe
      construct: cffi
      expected_diagnostic: unsafe_context_required
      code: |
        foreign func rand(): Int32
        main() { let r = rand() }

    - id: foreign_param_non_ctype
      construct: cffi
      expected_diagnostic: foreign_param_not_ctype
      code: |
        foreign func bad(xs: Array<Int64>): Unit

    - id: bad_annotation_target
      construct: annotation_decl
      expected_diagnostic: annotation_target_mismatch
      code: |
        @Annotation[target: [Type]]
        public class TypeOnly {
            const init() {}
        }
        @TypeOnly
        func notAType(): Unit {}

    - id: let_struct_calls_mut
      construct: struct_decl
      expected_diagnostic: let_struct_cannot_call_mut
      code: |
        struct S { var x = 0; public mut func inc() { x += 1 } }
        let s = S()
        s.inc()

    - id: rune_arithmetic
      construct: type_check_cast
      expected_diagnostic: rune_no_arithmetic
      code: |
        let r = r'a'
        let n = r + 1

  idioms:
    - id: trailing_lambda_call
      summary: When the final argument is a lambda, Cangjie permits trailing lambda syntax.
      requires: [function_decl, lambda_expr]
      template: |
        func apply(f: (Int64) -> Int64): Int64 { f(5) }
        let result = apply { i => i * i }

    - id: option_coalesce_pattern
      summary: Use ?? to provide a default value for an Option without explicit pattern matching.
      requires: [option_type]
      template: |
        let config: ?String = getEnv("MODE")
        let mode = config ?? "default"

    - id: expression_oriented_init
      summary: Use if-expression or match-expression to initialize a variable in a single let binding.
      requires: [variable_decl, if_expr, match_expr]
      template: |
        let sign = if (x > 0) { 1 } else if (x < 0) { -1 } else { 0 }

    - id: extend_for_interface_conformance
      summary: Add interface conformance to a foreign type through extend.
      requires: [extend_decl, interface_decl]
      template: |
        interface Describable { func describe(): String }
        extend Int64 <: Describable {
            public func describe(): String { this.toString() }
        }

    - id: spawn_collect_results
      summary: Spawn multiple tasks and collect results via Future.get().
      requires: [concurrency, lambda_expr]
      template: |
        let futures = Array(5) { i => spawn { => compute(i) } }
        let results = futures.map { f => f.get() }

    - id: pipe_chain
      summary: Chain transformations using |> for readable data pipelines.
      requires: [function_decl]
      template: |
        let result = input |> parse |> validate |> transform

    - id: primary_constructor_shorthand
      summary: Use primary constructor to declare fields and constructor in one line.
      requires: [class_decl, struct_decl]
      template: |
        struct Point(let x: Float64, let y: Float64) {}
        let p = Point(1.0, 2.0)

    - id: while_let_iterator
      summary: Use while-let to consume an iterator until exhaustion.
      requires: [while_loop, option_type]
      template: |
        while (let Some(item) <- iter.next()) {
            process(item)
        }
