definition:
  syntax: |
    enum EnumName {
        | Constructor1
        | Constructor2(Type1, Type2)
    }
  rules:
    - "At least one constructor required; separated by |"
    - "Constructors can be parameterless or parameterized"
    - "Same-name constructors allowed if parameter counts differ"
    - "Use backticks to escape keyword names: `Bool`, `String`"
    - "Top-level scope only"

  examples:
    simple: |
      enum Color { | Red | Green | Blue }
    parameterized: |
      enum Shape {
          | Circle(Float64)
          | Rectangle(Float64, Float64)
          | Point
      }
    recursive: |
      enum Expr {
          | Num(Int64)
          | Add(Expr, Expr)
          | Neg(Expr)
      }
    non_exhaustive: "enum Token { | Number | Plus | Minus | ... }"

usage:
  construction: |
    let c = Color.Red
    let s = Shape.Circle(5.0)
    let e: Expr = Add(Num(1), Num(2))  // short form with type context
  name_conflict: "Use qualified form: EnumName.Constructor"

members:
  example: |
    enum Direction {
        | North | South | East | West
        public func opposite(): Direction {
            match (this) {
                case North => South
                case South => North
                case East => West
                case West => East
            }
        }
        public static func cardinal(): Array<Direction> {
            [North, South, East, West]
        }
    }
  interface_implementation: |
    enum Color <: ToString {
        Red | Green | Blue
        public func toString(): String {
            match (this) {
                case Red => "Red"
                case Green => "Green"
                case Blue => "Blue"
            }
        }
    }

equality:
  default: "Enums do NOT support == by default"
  derive: |
    import std.deriving.*
    @Derive[Equatable]
    enum Color { | Red | Green | Blue }
  manual: |
    public operator func ==(rhs: Color): Bool {
        match ((this, rhs)) {
            case (Red, Red) | (Green, Green) | (Blue, Blue) => true
            case _ => false
        }
    }

generic_enum: |
  enum Option<T> { | Some(T) | None }
  enum Result<T, E> { | Ok(T) | Err(E) }
